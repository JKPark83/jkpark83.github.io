<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Segoe UI',Roboto,'Helvetica Neue',sans-serif">
  <rect width="720" height="340" fill="#0f172a"/>
  <text x="24" y="34" fill="#f8fafc" font-size="19" font-weight="700">Muse Spark 1.1은 '코딩 최강'이 아니라 '에이전트 툴' 모델</text>
  <text x="24" y="55" fill="#94a3b8" font-size="12">Terminal-Bench 2.1 (코딩 에이전트) — 가로축 70부터 확대. 값은 벤치 집계 기준(2026-07-09).</text>

  <!-- axis baseline -->
  <line x1="180" y1="90" x2="180" y2="250" stroke="#334155" stroke-width="1"/>
  <!-- gridlines at 75,80,85 -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="295" y1="90" x2="295" y2="250"/>
    <line x1="410" y1="90" x2="410" y2="250"/>
    <line x1="525" y1="90" x2="525" y2="250"/>
  </g>
  <g fill="#64748b" font-size="10" text-anchor="middle">
    <text x="180" y="266">70</text>
    <text x="295" y="266">75</text>
    <text x="410" y="266">80</text>
    <text x="525" y="266">85</text>
  </g>

  <!-- bars: (val-70)*23px -->
  <!-- GPT-5.5 83.4 -> 308 -->
  <rect x="180" y="98" width="308" height="34" rx="4" fill="#38bdf8"/>
  <text x="60" y="120" fill="#e2e8f0" font-size="13">GPT-5.5</text>
  <text x="498" y="120" fill="#38bdf8" font-size="13" font-weight="700">83.4</text>
  <!-- Opus 4.8 82.7 -> 292 -->
  <rect x="180" y="146" width="292" height="34" rx="4" fill="#34d399"/>
  <text x="60" y="168" fill="#e2e8f0" font-size="13">Opus 4.8</text>
  <text x="482" y="168" fill="#34d399" font-size="13" font-weight="700">82.7</text>
  <!-- Muse Spark 80.0 -> 230 -->
  <rect x="180" y="194" width="230" height="34" rx="4" fill="#a78bfa"/>
  <text x="40" y="216" fill="#e2e8f0" font-size="13">Muse Spark 1.1</text>
  <text x="420" y="216" fill="#a78bfa" font-size="13" font-weight="700">80.0</text>

  <!-- side panel: agent tool strength -->
  <rect x="24" y="286" width="672" height="42" rx="8" fill="#1a1330" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="40" y="312" fill="#a78bfa" font-size="12" font-weight="700">↔ 대신 에이전트 툴 사용에선 선두:</text>
  <text x="290" y="312" fill="#e2e8f0" font-size="12">MCP Atlas 88.1 · JobBench 54.7 · Humanity's Last Exam 62.1 (Muse Spark 1.1 자체 점수)</text>
</svg>
