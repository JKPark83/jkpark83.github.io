<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="720" height="400" fill="#0f172a"/>
  <text x="360" y="32" text-anchor="middle" fill="#f8fafc" font-size="19" font-weight="700">AgentDebugX — 실패 디버깅 폐루프</text>
  <text x="360" y="54" text-anchor="middle" fill="#94a3b8" font-size="12.5">에러가 '드러난' 스텝이 아니라 '유발한' 스텝을 찾는다</text>

  <!-- left: cycle -->
  <circle cx="200" cy="230" r="120" fill="none" stroke="#334155" stroke-dasharray="4 5"/>

  <rect x="140" y="118" width="120" height="52" rx="10" fill="#1e293b" stroke="#38bdf8"/>
  <text x="200" y="140" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">1. Detect</text>
  <text x="200" y="158" text-anchor="middle" fill="#cbd5e1" font-size="10.5">실패 감지</text>

  <rect x="300" y="204" width="120" height="52" rx="10" fill="#1e293b" stroke="#a78bfa"/>
  <text x="360" y="226" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">2. Attribute</text>
  <text x="360" y="244" text-anchor="middle" fill="#cbd5e1" font-size="10.5">근본원인 귀인</text>

  <rect x="140" y="290" width="120" height="52" rx="10" fill="#1e293b" stroke="#34d399"/>
  <text x="200" y="312" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">3. Recover</text>
  <text x="200" y="330" text-anchor="middle" fill="#cbd5e1" font-size="10.5">복구 시도</text>

  <rect x="-20" y="204" width="120" height="52" rx="10" fill="#1e293b" stroke="#fbbf24"/>
  <text x="40" y="226" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">4. Rerun</text>
  <text x="40" y="244" text-anchor="middle" fill="#cbd5e1" font-size="10.5">재실행 검증</text>

  <text x="200" y="234" text-anchor="middle" fill="#64748b" font-size="10.5">DeepDebug</text>
  <text x="200" y="250" text-anchor="middle" fill="#64748b" font-size="9.5">멀티턴 진단</text>

  <!-- right: bar chart of attribution accuracy -->
  <text x="500" y="118" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">엄격 귀인 정확도 (Who&amp;When)</text>
  <text x="500" y="136" text-anchor="middle" fill="#94a3b8" font-size="10.5">백본: qwen3.5-9b · exact agent+step</text>

  <!-- axis baseline -->
  <line x1="430" y1="320" x2="690" y2="320" stroke="#475569"/>

  <!-- baseline bar 21.7 -->
  <rect x="460" y="234" width="70" height="86" rx="4" fill="#475569"/>
  <text x="495" y="226" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700">21.7%</text>
  <text x="495" y="338" text-anchor="middle" fill="#94a3b8" font-size="10.5">최고 단일패스</text>

  <!-- deepdebug bar 28.8 -->
  <rect x="590" y="206" width="70" height="114" rx="4" fill="#34d399"/>
  <text x="625" y="198" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">28.8%</text>
  <text x="625" y="338" text-anchor="middle" fill="#94a3b8" font-size="10.5">DeepDebug</text>

  <text x="560" y="366" text-anchor="middle" fill="#64748b" font-size="11">GAIA: 실패 태스크 73건 중 13건 복구</text>
  <text x="360" y="388" text-anchor="middle" fill="#64748b" font-size="10.5">출처: arXiv 2607.18754 (cs.AI, 2026-07-21) · 값 검증됨, 자체 제작 차트</text>
</svg>
