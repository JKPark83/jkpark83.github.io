  <rect x="390" y="80" width="300" height="300" rx="14" fill="#1e293b" stroke="#334155"/>
  <text x="540" y="106" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="700">연구 (arXiv 7/20)</text>

  <rect x="410" y="122" width="260" height="66" rx="9" fill="#0b1220" stroke="#f472b6"/>
