<!--
  Tesla OAuth callback bounce page.

  Tesla redirects to https://jkpark83.github.io/callback?code=...&state=...
  This page reads the query string and forwards it to the local Flutter dev server
  so the running app (which holds the PKCE code_verifier in its own sessionStorage)
  can complete the token exchange.

  배포 위치:
    jkpark83.github.io 레포의 /callback 또는 /callback/index.html 로 푸시.
    (GitHub Pages가 자동으로 https://jkpark83.github.io/callback 으로 서비스함.)
-->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Tesla Remote — 로그인 처리 중</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, "SF Pro", "Pretendard", sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        max-width: 420px;
        padding: 24px;
        background: #1a1a1a;
        border-radius: 12px;
        text-align: center;
      }
      a { color: #e31937; }
      code { background: #000; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <h2>Tesla 로그인 처리 중…</h2>
      <p id="msg">잠시 후 로컬 앱으로 돌아갑니다.</p>
    </div>
    <script>
      // 로컬 앱이 떠 있는 포트들(개발 시 변경 가능). 첫 항목부터 시도.
      // 사용자가 다른 포트로 실행한 경우 ?port=NNN 쿼리 파라미터로 강제 가능.
      const DEFAULT_PORTS = [5555, 8080, 3000];

      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const state = params.get("state");
      const error = params.get("error");
      const errorDescription = params.get("error_description");
      const forcedPort = params.get("port");

      const ports = forcedPort ? [forcedPort] : DEFAULT_PORTS;
      const port = ports[0];
      const target = new URL(`http://localhost:${port}/auth-callback`);

      if (code) target.searchParams.set("code", code);
      if (state) target.searchParams.set("state", state);
      if (error) target.searchParams.set("error", error);
      if (errorDescription) {
        target.searchParams.set("error_description", errorDescription);
      }

      const msg = document.getElementById("msg");
      if (!code && !error) {
        msg.innerHTML =
          "OAuth 콜백 파라미터가 없습니다. 로그인 흐름을 다시 시작해 주세요.";
      } else {
        msg.innerHTML = `로컬 앱(${target.host})으로 이동합니다…<br><small>자동으로 이동하지 않으면 <a href="${target.href}">여기</a>를 클릭하세요.</small>`;
        window.location.replace(target.href);
      }
    </script>
  </body>
</html>
