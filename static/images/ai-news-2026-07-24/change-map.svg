<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="720" height="440" fill="#0f172a"/>
  <text x="360" y="34" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">오늘의 AI 변화 지도 — 2026-07-24</text>
  <text x="360" y="56" text-anchor="middle" fill="#94a3b8" font-size="13">테마: 오픈웨이트가 프런티어를 추격 · 에이전트는 '신뢰'를 설계로 얻는다</text>

  <!-- left column: 모델 & 툴링 -->
  <rect x="28" y="80" width="300" height="330" rx="14" fill="#1e293b" stroke="#334155"/>
