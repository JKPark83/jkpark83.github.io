<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="820" height="340" rx="16" fill="#f8fafc"/>
  <text x="410" y="36" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">완전 자기호스팅 스택 — 게이트 없이 굴리기</text>
  <text x="410" y="60" text-anchor="middle" fill="#64748b" font-size="12">에이전트(OpenClaw) + 로컬 모델(Ollama) = 프런티어 API 의존 0</text>

  <!-- star bars -->
  <text x="60" y="100" fill="#334155" font-size="13" font-weight="700">GitHub ★ (검증: repo 페이지)</text>

  <!-- OpenClaw bar -->
  <text x="60" y="140" fill="#0f172a" font-size="14" font-weight="700">OpenClaw 🦞</text>
  <rect x="60" y="150" width="680" height="34" rx="6" fill="#fef3c7"/>
  <rect x="60" y="150" width="680" height="34" rx="6" fill="#f59e0b"/>
  <text x="72" y="172" fill="#7c2d12" font-size="14" font-weight="700">382,000 ★</text>
  <text x="732" y="172" text-anchor="end" fill="#7c2d12" font-size="12">TypeScript · MIT</text>

  <!-- Ollama bar (175/382 ≈ 0.458 → width ~312) -->
  <text x="60" y="212" fill="#0f172a" font-size="14" font-weight="700">Ollama</text>
  <rect x="60" y="222" width="680" height="34" rx="6" fill="#e0e7ff"/>
  <rect x="60" y="222" width="312" height="34" rx="6" fill="#6366f1"/>
  <text x="72" y="244" fill="#ffffff" font-size="14" font-weight="700">175,000 ★</text>
  <text x="384" y="244" fill="#3730a3" font-size="12">Go · MIT</text>

  <!-- roles -->
  <rect x="60" y="278" width="330" height="46" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="72" y="298" fill="#9a3412" font-size="12" font-weight="700">OpenClaw = 개인 에이전트</text>
  <text x="72" y="315" fill="#c2410c" font-size="11">50+ 채널 · 쉘/브라우저/스케줄 실행</text>

  <rect x="410" y="278" width="330" height="46" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="422" y="298" fill="#3730a3" font-size="12" font-weight="700">Ollama = 로컬 모델 런타임</text>
  <text x="422" y="315" fill="#4338ca" font-size="11">Kimi-K2.6·GLM-5.1·DeepSeek·Qwen·Gemma</text>
</svg>
