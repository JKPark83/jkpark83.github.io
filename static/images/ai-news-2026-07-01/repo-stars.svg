<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="700" height="320" fill="#0f1117"/>
  <text x="350" y="32" fill="#e6e6e6" font-size="19" font-weight="700" text-anchor="middle">싼 에이전트 운영 스택 · GitHub Stars</text>
  <text x="350" y="53" fill="#8b93a7" font-size="12" text-anchor="middle">2026-07-01 GitHub API 기준</text>

  <!-- rows: horizontal bars, max ~52k -> scale: width 520 px for 55k => 0.00945 px/star -->
  <!-- litellm 52152 -->
  <text x="20" y="100" fill="#e6e6e6" font-size="14" font-weight="700">LiteLLM</text>
  <rect x="120" y="86" width="493" height="22" rx="5" fill="#1f6feb"/>
  <text x="623" y="103" fill="#cfe0ff" font-size="13" font-weight="700">52,152</text>

  <!-- langfuse 30168 -->
  <text x="20" y="160" fill="#e6e6e6" font-size="14" font-weight="700">Langfuse</text>
  <rect x="120" y="146" width="285" height="22" rx="5" fill="#3fb950"/>
  <text x="415" y="163" fill="#9be3a8" font-size="13" font-weight="700">30,168</text>

  <!-- opik 20153 -->
  <text x="20" y="220" fill="#e6e6e6" font-size="14" font-weight="700">Opik</text>
  <rect x="120" y="206" width="190" height="22" rx="5" fill="#a371f7"/>
  <text x="320" y="223" fill="#d2bbff" font-size="13" font-weight="700">20,153</text>

  <text x="120" y="266" fill="#8b93a7" font-size="12">게이트웨이(LiteLLM) → 관측·평가(Langfuse, Opik)로 묶으면</text>
  <text x="120" y="286" fill="#8b93a7" font-size="12">모델만 Sonnet 5로 바꿔도 비용·품질을 동시에 추적 가능</text>
  <text x="350" y="310" fill="#5b6478" font-size="11" text-anchor="middle">출처: GitHub API (직접 생성)</text>
</svg>
