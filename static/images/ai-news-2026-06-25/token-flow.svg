<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="760" height="340" fill="#0f1117"/>
  <text x="24" y="36" fill="#e6e6e6" font-size="19" font-weight="700">코드 검색 토큰 절약: grep+read vs semble(MCP)</text>

  <!-- Before path -->
  <text x="24" y="74" fill="#f0a93d" font-size="13" font-weight="700">기존 방식</text>
  <rect x="24" y="86" width="150" height="46" rx="8" fill="#241a16" stroke="#f0a93d" stroke-width="1.3"/>
  <text x="99" y="114" fill="#ffcf86" font-size="12.5" text-anchor="middle">grep 전체 스캔</text>
  <text x="186" y="113" fill="#5d6577" font-size="18">→</text>
  <rect x="206" y="86" width="150" height="46" rx="8" fill="#241a16" stroke="#f0a93d" stroke-width="1.3"/>
  <text x="281" y="108" fill="#ffcf86" font-size="12.5" text-anchor="middle">매칭 파일 통째</text>
  <text x="281" y="124" fill="#ffcf86" font-size="12.5" text-anchor="middle">read</text>
  <text x="368" y="113" fill="#5d6577" font-size="18">→</text>
  <rect x="388" y="86" width="170" height="46" rx="8" fill="#3a1f1f" stroke="#e85d5d" stroke-width="1.3"/>
  <text x="473" y="114" fill="#ff9b9b" font-size="13" font-weight="700" text-anchor="middle">컨텍스트 폭증 💸</text>

  <!-- After path -->
  <text x="24" y="190" fill="#3ddc97" font-size="13" font-weight="700">semble MCP 방식</text>
  <rect x="24" y="202" width="150" height="46" rx="8" fill="#16241c" stroke="#3ddc97" stroke-width="1.3"/>
  <text x="99" y="224" fill="#7ef0bf" font-size="12.5" text-anchor="middle">시맨틱 임베딩</text>
  <text x="99" y="240" fill="#7ef0bf" font-size="12.5" text-anchor="middle">검색</text>
  <text x="186" y="229" fill="#5d6577" font-size="18">→</text>
  <rect x="206" y="202" width="150" height="46" rx="8" fill="#16241c" stroke="#3ddc97" stroke-width="1.3"/>
  <text x="281" y="224" fill="#7ef0bf" font-size="12.5" text-anchor="middle">관련 스니펫만</text>
  <text x="281" y="240" fill="#7ef0bf" font-size="12.5" text-anchor="middle">반환</text>
  <text x="368" y="229" fill="#5d6577" font-size="18">→</text>
  <rect x="388" y="202" width="170" height="46" rx="8" fill="#16241c" stroke="#3ddc97" stroke-width="1.3"/>
  <text x="473" y="230" fill="#7ef0bf" font-size="13" font-weight="700" text-anchor="middle">토큰 ~98%↓ ✅</text>

  <!-- side note -->
  <rect x="586" y="120" width="150" height="100" rx="10" fill="#1a1f2e" stroke="#5b8def" stroke-width="1.3"/>
  <text x="601" y="146" fill="#a9c4ff" font-size="12.5" font-weight="700">적용</text>
  <text x="601" y="170" fill="#c4d4f0" font-size="11">claude mcp add</text>
  <text x="601" y="188" fill="#c4d4f0" font-size="11">semble로 등록</text>
  <text x="601" y="206" fill="#c4d4f0" font-size="11">→ 검색 툴 교체</text>

  <text x="24" y="300" fill="#8a93a6" font-size="12">수치(~98%↓)는 MinishLab/semble 저장소 자체 설명 기준. 실제 절감은 코드베이스·쿼리에 따라 다름.</text>
  <text x="24" y="322" fill="#5d6577" font-size="11">출처: github.com/MinishLab/semble (MIT)</text>
</svg>
