<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="저장소 스타 비교">
  <rect width="760" height="300" fill="#0f1117"/>
  <text x="24" y="36" fill="#e6e8ee" font-size="19" font-weight="700">오픈소스 에이전트 CLI 스타 비교</text>
  <text x="24" y="56" fill="#8b93a7" font-size="12">GitHub API 기준 · 막대 길이는 스타 수에 비례 (최대값 = 380.9k)</text>

  <!-- OpenClaw: 380857 -> width scaled to 660 max -->
  <text x="24" y="100" fill="#cbd5e1" font-size="13">openclaw/openclaw</text>
  <rect x="24" y="108" width="660" height="26" rx="5" fill="#1b2230"/>
  <rect x="24" y="108" width="660" height="26" rx="5" fill="#22c55e"/>
  <text x="694" y="126" fill="#bbf7d0" font-size="13" font-weight="700">380.9k★</text>

  <!-- Hermes: 204928 -> 204928/380857*660 = 355 -->
