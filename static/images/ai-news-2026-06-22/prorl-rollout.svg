<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <rect width="760" height="380" fill="#0f172a"/>
  <text x="380" y="36" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">ProRL Agent — Rollout-as-a-Service 구조</text>
  <text x="380" y="58" fill="#94a3b8" font-size="12.5" text-anchor="middle">트레이너와 롤아웃을 HTTP로 분리, token-in / token-out 통신</text>

  <!-- Trainer -->
  <rect x="40" y="120" width="170" height="120" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="125" y="150" fill="#38bdf8" font-size="15" font-weight="700" text-anchor="middle">RL Trainer</text>
  <text x="125" y="176" fill="#e2e8f0" font-size="12" text-anchor="middle">정책 업데이트</text>
  <text x="125" y="196" fill="#94a3b8" font-size="11" text-anchor="middle">토큰 단위 trajectory</text>
  <text x="125" y="214" fill="#94a3b8" font-size="11" text-anchor="middle">직접 소비</text>

  <!-- Rollout Service -->
  <rect x="295" y="105" width="180" height="150" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="385" y="134" fill="#a78bfa" font-size="15" font-weight="700" text-anchor="middle">Rollout Service</text>
  <text x="385" y="156" fill="#e2e8f0" font-size="12" text-anchor="middle">(HTTP 서버)</text>
  <text x="385" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">환경 초기화 →</text>
  <text x="385" y="200" fill="#94a3b8" font-size="11" text-anchor="middle">에이전트 실행 →</text>
  <text x="385" y="218" fill="#94a3b8" font-size="11" text-anchor="middle">결과 평가</text>
  <text x="385" y="240" fill="#fbbf24" font-size="10.5" text-anchor="middle">re-tokenization drift 제거</text>

  <!-- Sandboxes -->
  <rect x="560" y="92" width="160" height="40" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.6"/>
  <text x="640" y="117" fill="#e2e8f0" font-size="12.5" text-anchor="middle">SWE 샌드박스</text>
  <rect x="560" y="142" width="160" height="40" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.6"/>
  <text x="640" y="167" fill="#e2e8f0" font-size="12.5" text-anchor="middle">Coding 샌드박스</text>
  <rect x="560" y="192" width="160" height="40" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.6"/>
  <text x="640" y="217" fill="#e2e8f0" font-size="12.5" text-anchor="middle">Math / STEM</text>
  <text x="640" y="252" fill="#94a3b8" font-size="10.5" text-anchor="middle">rootless HPC · 확장형</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <!-- trainer <-> service -->
  <line x1="210" y1="170" x2="291" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="291" y1="195" x2="210" y2="195" stroke="#64748b" stroke-width="2" marker-end="url(#a2)"/>
  <text x="250" y="160" fill="#94a3b8" font-size="9.5" text-anchor="middle">tokens-in</text>
  <text x="250" y="212" fill="#94a3b8" font-size="9.5" text-anchor="middle">trajectory-out</text>
  <!-- service -> sandboxes -->
  <line x1="475" y1="150" x2="556" y2="112" stroke="#64748b" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="475" y1="180" x2="556" y2="162" stroke="#64748b" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="475" y1="205" x2="556" y2="212" stroke="#64748b" stroke-width="1.8" marker-end="url(#a2)"/>

  <text x="380" y="320" fill="#cbd5e1" font-size="12.5" text-anchor="middle">핵심: 롤아웃을 독립 서비스로 빼면 트레이너가 GPU에서 노는 시간이 줄고,</text>
  <text x="380" y="342" fill="#cbd5e1" font-size="12.5" text-anchor="middle">새 환경(도구·테스트)을 코드 수정 없이 붙일 수 있다. (NVIDIA NeMo Gym 통합)</text>
</svg>
