<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="760" height="260" fill="#0f1117"/>
  <text x="380" y="32" fill="#e6e6e6" font-size="19" font-weight="700" text-anchor="middle">Agent Builder 시사점 · 새 모델을 믿기 전 루틴</text>
  <text x="380" y="53" fill="#8b93a7" font-size="12" text-anchor="middle">리더보드 점수 → 내 하네스 델타로 번역하는 5단계</text>

  <!-- boxes -->
  <g>
    <rect x="20" y="90" width="130" height="70" rx="9" fill="#161b26" stroke="#f0883e" stroke-width="1.6"/>
    <text x="85" y="120" fill="#f0b57a" font-size="13" font-weight="700" text-anchor="middle">① 신호 포착</text>
    <text x="85" y="140" fill="#8b93a7" font-size="10.5" text-anchor="middle">GPT-5.6 SOTA</text>
  </g>
  <g>
    <rect x="176" y="90" width="130" height="70" rx="9" fill="#161b26" stroke="#1f6feb" stroke-width="1.6"/>
    <text x="241" y="114" fill="#79c0ff" font-size="13" font-weight="700" text-anchor="middle">② 하네스 고정</text>
    <text x="241" y="133" fill="#8b93a7" font-size="10.5" text-anchor="middle">Terminal-Bench</text>
    <text x="241" y="147" fill="#8b93a7" font-size="10.5" text-anchor="middle">/ SWE-bench</text>
  </g>
  <g>
    <rect x="332" y="90" width="130" height="70" rx="9" fill="#161b26" stroke="#1f6feb" stroke-width="1.6"/>
    <text x="397" y="114" fill="#79c0ff" font-size="13" font-weight="700" text-anchor="middle">③ 내 태스크</text>
    <text x="397" y="133" fill="#8b93a7" font-size="10.5" text-anchor="middle">실제 레포·이슈</text>
    <text x="397" y="147" fill="#8b93a7" font-size="10.5" text-anchor="middle">고정 데이터셋</text>
  </g>
  <g>
    <rect x="488" y="90" width="130" height="70" rx="9" fill="#161b26" stroke="#3fb950" stroke-width="1.6"/>
    <text x="553" y="114" fill="#7ee787" font-size="13" font-weight="700" text-anchor="middle">④ 델타 측정</text>
    <text x="553" y="133" fill="#8b93a7" font-size="10.5" text-anchor="middle">정확도·툴콜</text>
    <text x="553" y="147" fill="#8b93a7" font-size="10.5" text-anchor="middle">·토큰·비용</text>
  </g>
  <g>
    <rect x="644" y="90" width="100" height="70" rx="9" fill="#161b26" stroke="#a371f7" stroke-width="1.6"/>
    <text x="694" y="120" fill="#d2bbff" font-size="13" font-weight="700" text-anchor="middle">⑤ 승격</text>
    <text x="694" y="140" fill="#8b93a7" font-size="10.5" text-anchor="middle">델타 양수만</text>
  </g>

  <!-- arrows -->
  <g fill="#3b4252">
    <polygon points="150,125 176,125 170,120 170,130" />
    <polygon points="306,125 332,125 326,120 326,130" />
    <polygon points="462,125 488,125 482,120 482,130" />
    <polygon points="618,125 644,125 638,120 638,130" />
  </g>

  <text x="380" y="205" fill="#8b93a7" font-size="12" text-anchor="middle">핵심: "벤치가 올랐다" ≠ "내 워크로드가 좋아졌다". 같은 하네스로 전/후를 비교해야 신뢰 가능.</text>
  <text x="380" y="228" fill="#6b7280" font-size="11" text-anchor="middle">GPT-5.6 Sol은 한정 프리뷰라 아직 ②~⑤를 돌릴 수 없음 → 지금은 Codex 0.142.5 stable로 파이프라인만 구축.</text>
</svg>
