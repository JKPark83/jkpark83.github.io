<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Segoe UI',Roboto,'Helvetica Neue',sans-serif">
  <rect width="720" height="440" fill="#0f172a"/>
  <text x="24" y="36" fill="#f8fafc" font-size="20" font-weight="700">Programmatic Tool Calling — 툴콜을 코드로 오케스트레이션</text>
  <text x="24" y="58" fill="#94a3b8" font-size="12">전통 방식은 매 툴 결과를 모델 컨텍스트로 왕복. PTC는 모델이 JS를 짜서 런타임에서 툴을 돌리고 필요한 상태만 반환.</text>

  <!-- LEFT: traditional -->
  <text x="40" y="92" fill="#f87171" font-size="14" font-weight="700">전통 툴콜 루프</text>
  <g stroke="#7f1d1d" stroke-width="1.5" fill="none">
    <path d="M120 130 L120 165" marker-end="url(#ra)"/>
    <path d="M120 205 L120 240" marker-end="url(#ra)"/>
    <path d="M120 280 L120 315" marker-end="url(#ra)"/>
  </g>
  <g>
    <rect x="40" y="105" width="160" height="30" rx="6" fill="#1e293b" stroke="#f87171"/>
    <text x="120" y="124" fill="#e2e8f0" font-size="11" text-anchor="middle">모델: 툴콜 1건 요청</text>
    <rect x="40" y="170" width="160" height="30" rx="6" fill="#1e293b" stroke="#475569"/>
    <text x="120" y="189" fill="#cbd5e1" font-size="11" text-anchor="middle">코드: 툴 실행</text>
    <rect x="40" y="245" width="160" height="30" rx="6" fill="#1e293b" stroke="#475569"/>
    <text x="120" y="264" fill="#cbd5e1" font-size="11" text-anchor="middle">전체 결과 → 컨텍스트</text>
    <rect x="40" y="320" width="160" height="30" rx="6" fill="#1e293b" stroke="#f87171"/>
    <text x="120" y="339" fill="#e2e8f0" font-size="11" text-anchor="middle">모델: 다음 툴콜 재판단</text>
  </g>
  <text x="40" y="375" fill="#f87171" font-size="11">↻ 툴 개수만큼 모델 왕복 · 중간결과 전부 토큰 소모</text>

  <!-- divider -->
  <line x1="360" y1="80" x2="360" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: PTC -->
  <text x="400" y="92" fill="#34d399" font-size="14" font-weight="700">Programmatic Tool Calling</text>
  <g stroke="#065f46" stroke-width="1.5" fill="none">
    <path d="M480 130 L480 165" marker-end="url(#ga)"/>
    <path d="M480 245 L480 280" marker-end="url(#ga)"/>
  </g>
  <g>
    <rect x="400" y="105" width="160" height="30" rx="6" fill="#1e293b" stroke="#34d399"/>
    <text x="480" y="124" fill="#e2e8f0" font-size="11" text-anchor="middle">모델: JS 프로그램 1회 작성</text>
    <rect x="400" y="170" width="230" height="75" rx="8" fill="#0b3b34" stroke="#34d399"/>
    <text x="515" y="190" fill="#6ee7b7" font-size="11" font-weight="700" text-anchor="middle">격리 V8 런타임 (네트워크 X)</text>
    <text x="515" y="209" fill="#e2e8f0" font-size="10.5" text-anchor="middle">툴 여러 개 순차·병렬 실행</text>
    <text x="515" y="226" fill="#e2e8f0" font-size="10.5" text-anchor="middle">중간결과 필터·요약·정렬</text>
    <rect x="400" y="285" width="230" height="30" rx="6" fill="#1e293b" stroke="#34d399"/>
    <text x="515" y="304" fill="#e2e8f0" font-size="11" text-anchor="middle">유용한 상태만 → 컨텍스트</text>
  </g>
  <g>
    <rect x="400" y="335" width="230" height="52" rx="8" fill="#0f2f28" stroke="#10b981" stroke-width="1.5"/>
    <text x="515" y="357" fill="#6ee7b7" font-size="13" font-weight="700" text-anchor="middle">출력 토큰 -24% · 완료 -28% 시간</text>
    <text x="515" y="376" fill="#94a3b8" font-size="10" text-anchor="middle">동일 품질 유지 (OpenAI 공지 기준)</text>
  </g>

  <defs>
    <marker id="ra" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f87171"/></marker>
    <marker id="ga" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#34d399"/></marker>
  </defs>
</svg>
