  <!-- gemini-cli 105599 -> max bar -->
  <rect x="180" y="100" width="500" height="40" rx="6" fill="#3f72a0"/>
  <text x="172" y="125" fill="#cdd6e4" font-size="14" text-anchor="end">gemini-cli</text>
  <text x="690" y="125" fill="#fff" font-size="14" font-weight="700" text-anchor="end">105.6k ★ · TS</text>

