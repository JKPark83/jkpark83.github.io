<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="720" height="400" fill="#0f1524"/>
  <text x="360" y="32" text-anchor="middle" fill="#e8edf7" font-size="18" font-weight="700">ToolAtlas — 공급자(툴) 측 메모리의 상대 개선</text>
  <text x="360" y="54" text-anchor="middle" fill="#8ea0c0" font-size="12">기존 툴측 최적화·에이전트측 메모리 대비 최대 상대 향상 (%)</text>

  <!-- axis -->
  <line x1="90" y1="300" x2="680" y2="300" stroke="#39496b" stroke-width="1.5"/>
  <line x1="90" y1="110" x2="90" y2="300" stroke="#39496b" stroke-width="1.5"/>
  <text x="60" y="304" text-anchor="end" fill="#7f90ad" font-size="10">0</text>
  <text x="60" y="240" text-anchor="end" fill="#7f90ad" font-size="10">10</text>
  <text x="60" y="177" text-anchor="end" fill="#7f90ad" font-size="10">20</text>
  <text x="60" y="114" text-anchor="end" fill="#7f90ad" font-size="10">30</text>

  <!-- bars: scale 5.5px per % (30% -> 165px). base y=300 -->
  <!-- same-benchmark pass@1 21.61 -->
  <rect x="130" y="181.1" width="56" height="118.9" rx="4" fill="#54c69a"/>
  <text x="158" y="173" text-anchor="middle" fill="#d2ffe9" font-size="12" font-weight="700">+21.61</text>
  <!-- pass@4 18.61 -->
  <rect x="196" y="197.6" width="56" height="102.4" rx="4" fill="#3f9e7c"/>
  <text x="224" y="190" text-anchor="middle" fill="#d2ffe9" font-size="12" font-weight="700">+18.61</text>
  <text x="191" y="322" text-anchor="middle" fill="#b9c6de" font-size="11">벤치 내</text>
  <text x="191" y="338" text-anchor="middle" fill="#8ea0c0" font-size="10">pass@1 / pass@4</text>

  <!-- transfer across env instances 24.16 / 16.22 -->
  <rect x="330" y="167.1" width="56" height="132.9" rx="4" fill="#5b8def"/>
  <text x="358" y="159" text-anchor="middle" fill="#d3e2ff" font-size="12" font-weight="700">+24.16</text>
  <rect x="396" y="210.8" width="56" height="89.2" rx="4" fill="#3f6bc0"/>
  <text x="424" y="203" text-anchor="middle" fill="#d3e2ff" font-size="12" font-weight="700">+16.22</text>
  <text x="391" y="322" text-anchor="middle" fill="#b9c6de" font-size="11">환경 인스턴스 전이</text>
  <text x="391" y="338" text-anchor="middle" fill="#8ea0c0" font-size="10">pass@1 / pass@4</text>

  <!-- transfer across agent frameworks 17.49 / 14.27 -->
  <rect x="530" y="203.8" width="56" height="96.2" rx="4" fill="#c98be0"/>
  <text x="558" y="196" text-anchor="middle" fill="#efd8ff" font-size="12" font-weight="700">+17.49</text>
  <rect x="596" y="221.5" width="56" height="78.5" rx="4" fill="#9a63b5"/>
  <text x="624" y="214" text-anchor="middle" fill="#efd8ff" font-size="12" font-weight="700">+14.27</text>
  <text x="591" y="322" text-anchor="middle" fill="#b9c6de" font-size="11">에이전트 프레임워크 전이</text>
  <text x="591" y="338" text-anchor="middle" fill="#8ea0c0" font-size="10">pass@1 / pass@4</text>

  <text x="360" y="372" text-anchor="middle" fill="#8ea0c0" font-size="11">재학습·과제시점 탐색 없이 전이 · 벤치: 2개 MCP 벤치마크, 8개 서비스 (arXiv 2607.11126)</text>
</svg>
