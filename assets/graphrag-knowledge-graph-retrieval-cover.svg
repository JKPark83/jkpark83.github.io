<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="벡터 검색과 GraphRAG를 대비한 그림. 왼쪽은 흩어진 점 세 개를 각각 찾지만 서로 잇지 못해 물음표가 붙은 벡터 검색이고, 오른쪽은 같은 점들이 엔티티 노드가 되어 화살표로 연결된 그래프를 따라가며 답에 이르는 GraphRAG다.">
  <defs>
    <linearGradient id="grg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#101a30"/>
    </linearGradient>
    <marker id="grg-a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#94a3b8"/></marker>
    <marker id="grg-ag" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0 0 L7 3.2 L0 6.4 Z" fill="#4ade80"/></marker>
  </defs>
  <rect width="1200" height="630" fill="url(#grg-bg)"/>

  <text x="80" y="92" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="43" font-weight="800">점은 찾아도, 선은 못 잇는다</text>
  <text x="80" y="142" fill="#7dd3fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="28" font-weight="700">여러 사실을 이어야 답이 나올 때 쓰는 GraphRAG(그래프 RAG)</text>

  <!-- divider -->
  <line x1="600" y1="200" x2="600" y2="560" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- LEFT: vector search — isolated dots -->
  <text x="300" y="212" fill="#fb7185" font-family="ui-sans-serif,system-ui,sans-serif" font-size="24" font-weight="700" text-anchor="middle">벡터 검색: 조각을 따로따로</text>
  <circle cx="150" cy="300" r="34" fill="#3a1420" stroke="#fb7185" stroke-width="2"/>
  <text x="150" y="306" fill="#fda4af" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="middle">A사</text>
  <circle cx="300" cy="400" r="34" fill="#3a1420" stroke="#fb7185" stroke-width="2"/>
  <text x="300" y="406" fill="#fda4af" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="middle">인수</text>
  <circle cx="460" cy="310" r="34" fill="#3a1420" stroke="#fb7185" stroke-width="2"/>
  <text x="460" y="316" fill="#fda4af" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="middle">B사</text>
  <text x="300" y="505" fill="#fb7185" font-family="ui-sans-serif,system-ui,sans-serif" font-size="60" font-weight="800" text-anchor="middle">?</text>
  <text x="300" y="548" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" text-anchor="middle">셋 다 찾았지만 관계를 못 이음</text>

  <!-- RIGHT: GraphRAG — connected path -->
  <text x="900" y="212" fill="#4ade80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="24" font-weight="700" text-anchor="middle">GraphRAG: 관계를 따라</text>
  <path d="M786 300 L864 388" stroke="#4ade80" stroke-width="2.5" marker-end="url(#grg-ag)"/>
  <path d="M936 388 L1014 312" stroke="#4ade80" stroke-width="2.5" marker-end="url(#grg-ag)"/>
  <circle cx="760" cy="300" r="36" fill="#0b2f1f" stroke="#4ade80" stroke-width="2.5"/>
  <text x="760" y="306" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="middle">A사</text>
  <circle cx="900" cy="400" r="36" fill="#0b2f1f" stroke="#4ade80" stroke-width="2.5"/>
  <text x="900" y="406" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="middle">인수</text>
  <circle cx="1040" cy="300" r="36" fill="#0b2f1f" stroke="#4ade80" stroke-width="2.5"/>
  <text x="1040" y="306" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="middle">B사</text>
  <text x="822" y="360" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" text-anchor="middle">—인수—</text>
  <text x="985" y="360" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" text-anchor="middle">—피인수—</text>
  <text x="900" y="505" fill="#4ade80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="26" font-weight="800" text-anchor="middle">A → B 경로 발견</text>
  <text x="900" y="548" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" text-anchor="middle">관계를 타고 multi-hop 답에 도달</text>

  <text x="80" y="600" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16">벡터 RAG는 비슷한 조각을 찾고, GraphRAG는 엔티티 사이의 관계를 검색한다.</text>
</svg>
