<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="720" height="400" fill="#0f172a"/>
  <text x="360" y="34" text-anchor="middle" fill="#f8fafc" font-size="19" font-weight="700">CodeRescue — 예산 보정 복구 라우팅</text>
  <text x="360" y="55" text-anchor="middle" fill="#94a3b8" font-size="12.5">코딩 에이전트가 실패하면: 무작정 승격하지 말고 라우터가 판단</text>

  <!-- flow -->
  <rect x="30" y="90" width="150" height="60" rx="10" fill="#1e293b" stroke="#38bdf8"/>
  <text x="105" y="118" text-anchor="middle" fill="#f8fafc" font-size="12.5" font-weight="700">코딩 에이전트</text>
  <text x="105" y="136" text-anchor="middle" fill="#cbd5e1" font-size="11">실행 → 테스트 실패</text>

  <line x1="180" y1="120" x2="228" y2="120" stroke="#64748b" stroke-width="2"/>
  <polygon points="228,120 220,116 220,124" fill="#64748b"/>

  <rect x="230" y="88" width="160" height="64" rx="10" fill="#1e293b" stroke="#f472b6"/>
  <text x="310" y="114" text-anchor="middle" fill="#f472b6" font-size="12.5" font-weight="700">복구 라우터</text>
  <text x="310" y="132" text-anchor="middle" fill="#cbd5e1" font-size="10.5">실행 피드백 + conformal</text>
  <text x="310" y="146" text-anchor="middle" fill="#cbd5e1" font-size="10.5">risk control로 예산 보정</text>

  <!-- branch cheap -->
  <line x1="390" y1="105" x2="470" y2="80" stroke="#a3e635" stroke-width="2"/>
  <polygon points="470,80 461,80 466,88" fill="#a3e635"/>
  <rect x="472" y="58" width="218" height="52" rx="10" fill="#0b1220" stroke="#a3e635"/>
  <text x="486" y="80" fill="#a3e635" font-size="12" font-weight="700">저가 모델로 재시도</text>
  <text x="486" y="98" fill="#cbd5e1" font-size="10.5">회복 가능해 보이면 값싸게 다시</text>

  <!-- branch escalate -->
  <line x1="390" y1="135" x2="470" y2="162" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="470,162 461,157 462,166" fill="#fbbf24"/>
  <rect x="472" y="140" width="218" height="52" rx="10" fill="#0b1220" stroke="#fbbf24"/>
  <text x="486" y="162" fill="#fbbf24" font-size="12" font-weight="700">강한 모델로 승격</text>
  <text x="486" y="180" fill="#cbd5e1" font-size="10.5">필요할 때만 비싼 경로 사용</text>

  <!-- result panel -->
  <rect x="30" y="230" width="660" height="140" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="52" y="260" fill="#f8fafc" font-size="14" font-weight="700">검증된 결과</text>

  <!-- bar: solve rate -->
  <text x="52" y="292" fill="#cbd5e1" font-size="12">해결률(solve rate)</text>
  <rect x="230" y="280" width="300" height="16" rx="4" fill="#0b1220"/>
  <rect x="230" y="280" width="300" height="16" rx="4" fill="#a3e635"/>
  <text x="540" y="293" fill="#a3e635" font-size="11.5" font-weight="700">항상-승격 &gt; 초과</text>

  <!-- bar: cost -->
  <text x="52" y="330" fill="#cbd5e1" font-size="12">평균 복구 비용</text>
  <rect x="230" y="318" width="300" height="16" rx="4" fill="#0b1220"/>
  <rect x="230" y="318" width="105" height="16" rx="4" fill="#38bdf8"/>
  <text x="345" y="331" fill="#38bdf8" font-size="11.5" font-weight="700">항상-승격의 35%</text>
  <text x="540" y="331" fill="#64748b" font-size="10.5">(막대: 상대 비용)</text>

  <text x="52" y="358" fill="#94a3b8" font-size="11">→ 더 높은 해결률을 항상-승격 비용의 1/3로 달성. 출처: arXiv 2607.19338</text>
</svg>
