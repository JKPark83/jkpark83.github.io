<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="760" height="380" fill="#0f1117"/>
  <text x="380" y="34" fill="#e6e6e6" font-size="20" font-weight="700" text-anchor="middle">오늘의 AI 변화 지도 · 2026-07-02</text>
  <text x="380" y="56" fill="#8b93a7" font-size="12" text-anchor="middle">SOTA 코딩 에이전트 모델은 나왔는데 못 쓴다 → 그럼 내 하네스로 평가부터</text>

  <!-- center: GPT-5.6 Sol -->
  <rect x="290" y="90" width="180" height="60" rx="10" fill="#161b26" stroke="#f0883e" stroke-width="2"/>
  <text x="380" y="116" fill="#f0b57a" font-size="15" font-weight="700" text-anchor="middle">GPT-5.6 Sol</text>
  <text x="380" y="136" fill="#8b93a7" font-size="11" text-anchor="middle">Terminal-Bench 2.1 최상위 · 한정 프리뷰</text>

  <!-- left: Codex usable -->
  <rect x="40" y="200" width="200" height="66" rx="10" fill="#161b26" stroke="#3fb950" stroke-width="2"/>
  <text x="140" y="226" fill="#7ee787" font-size="14" font-weight="700" text-anchor="middle">Codex 0.142.5 (stable)</text>
  <text x="140" y="245" fill="#8b93a7" font-size="11" text-anchor="middle">오늘 실제로 쓰는 것</text>
  <text x="140" y="259" fill="#8b93a7" font-size="11" text-anchor="middle">trace 로그 payload 누출 수정</text>

  <!-- right: eval harness -->
  <rect x="520" y="200" width="200" height="66" rx="10" fill="#161b26" stroke="#1f6feb" stroke-width="2"/>
  <text x="620" y="226" fill="#79c0ff" font-size="14" font-weight="700" text-anchor="middle">평가 하네스</text>
  <text x="620" y="245" fill="#8b93a7" font-size="11" text-anchor="middle">Terminal-Bench · SWE-bench</text>
  <text x="620" y="259" fill="#8b93a7" font-size="11" text-anchor="middle">리더보드 대신 내 태스크로</text>

  <!-- bottom: own workload -->
  <rect x="290" y="310" width="180" height="52" rx="10" fill="#161b26" stroke="#a371f7" stroke-width="2"/>
  <text x="380" y="333" fill="#d2bbff" font-size="14" font-weight="700" text-anchor="middle">내 워크로드 델타</text>
  <text x="380" y="351" fill="#8b93a7" font-size="11" text-anchor="middle">비용·정확도 확인 후에만 승격</text>

  <!-- connectors -->
  <line x1="290" y1="128" x2="200" y2="200" stroke="#3b4252" stroke-width="1.5"/>
  <line x1="470" y1="128" x2="560" y2="200" stroke="#3b4252" stroke-width="1.5"/>
  <line x1="240" y1="248" x2="520" y2="240" stroke="#3b4252" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="620" y1="266" x2="440" y2="315" stroke="#3b4252" stroke-width="1.5"/>
  <line x1="140" y1="266" x2="320" y2="315" stroke="#3b4252" stroke-width="1.5"/>
</svg>
