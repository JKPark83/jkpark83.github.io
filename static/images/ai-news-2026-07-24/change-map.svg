  <rect x="48" y="122" width="260" height="66" rx="9" fill="#0b1220" stroke="#38bdf8"/>
  <text x="62" y="145" fill="#f8fafc" font-size="13" font-weight="700">Kimi K3 (Moonshot)</text>
  <text x="62" y="164" fill="#cbd5e1" font-size="11.5">2.8T MoE · 1M 컨텍스트 · AA 랭킹 3위</text>
  <text x="62" y="181" fill="#cbd5e1" font-size="11.5">오픈웨이트 7/27 · $3 / $15 per 1M</text>

  <rect x="48" y="200" width="260" height="60" rx="9" fill="#0b1220" stroke="#38bdf8"/>
  <text x="62" y="223" fill="#f8fafc" font-size="13" font-weight="700">Claude Code v2.1.218</text>
  <text x="62" y="242" fill="#cbd5e1" font-size="11.5">/code-review = 백그라운드 서브에이전트</text>
  <text x="62" y="255" fill="#cbd5e1" font-size="11">대화창을 안 채우고 리뷰를 돌린다</text>

  <rect x="48" y="272" width="260" height="60" rx="9" fill="#0b1220" stroke="#38bdf8"/>
  <text x="62" y="295" fill="#f8fafc" font-size="13" font-weight="700">Codex — Record &amp; Replay</text>
  <text x="62" y="314" fill="#cbd5e1" font-size="11.5">시연한 워크플로 → 재사용 skill(macOS)</text>
  <text x="62" y="327" fill="#cbd5e1" font-size="11">Sites 프리뷰 · Windows Computer Use</text>

  <text x="178" y="366" text-anchor="middle" fill="#64748b" font-size="11">→ 값싼 오픈웨이트 + 리뷰·시연 자동화</text>
  <text x="178" y="392" text-anchor="middle" fill="#64748b" font-size="11">모델은 싸지고, 툴은 반복작업을 흡수한다</text>

  <!-- right column: 연구 & 오픈소스 -->
  <rect x="392" y="80" width="300" height="330" rx="14" fill="#1e293b" stroke="#334155"/>
  <text x="542" y="106" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">연구 &amp; 오픈소스</text>

  <rect x="412" y="122" width="260" height="60" rx="9" fill="#0b1220" stroke="#a78bfa"/>
  <text x="426" y="145" fill="#f8fafc" font-size="13" font-weight="700">AgentDebugX (2607.18754)</text>
