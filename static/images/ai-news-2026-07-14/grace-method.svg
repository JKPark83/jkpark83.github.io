<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="0" y="0" width="820" height="470" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="30" y="40" font-size="21" font-weight="700" fill="#0f172a">GRACE: 지시문을 그래프로 관리하고 국소 검증</text>
  <text x="30" y="64" font-size="13" fill="#64748b">모델·툴·하네스는 고정, 변하는 건 지속 시스템 지시문뿐 · τ²-bench 텔레콤 하네스</text>

  <!-- Left: flat text problem -->
  <rect x="30" y="86" width="345" height="180" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="48" y="112" font-size="15" font-weight="700" fill="#991b1b">❌ 평문(flat-text) 유지</text>
  <g font-size="12" fill="#7f1d1d">
    <text x="48" y="138">경험이 쌓일수록 지시문이 길어지고</text>
    <text x="48" y="158">서로 얽혀 어떤 수정이 안전한지</text>
    <text x="48" y="178">검증이 점점 어려워짐</text>
  </g>
  <rect x="48" y="192" width="309" height="58" rx="8" fill="#ffffff" stroke="#fca5a5"/>
  <text x="62" y="214" font-size="11.5" fill="#b91c1c" font-family="monospace">지시문 #1 ... #57 ... #58 (충돌?)</text>
  <text x="62" y="234" font-size="11.5" fill="#b91c1c" font-family="monospace">전체를 다시 읽어야 검증 가능</text>

  <!-- Right: typed graph -->
  <rect x="445" y="86" width="345" height="180" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="463" y="112" font-size="15" font-weight="700" fill="#065f46">✅ 타입드 시맨틱 그래프</text>
  <text x="463" y="134" font-size="12" fill="#047857">수정된 노드의 국소 이웃만 검증</text>
  <!-- mini graph -->
  <g>
    <circle cx="540" cy="185" r="20" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>
    <circle cx="630" cy="165" r="20" fill="#6ee7b7" stroke="#059669" stroke-width="2.5"/>
    <circle cx="710" cy="200" r="20" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>
    <circle cx="600" cy="235" r="20" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>
    <line x1="558" y1="178" x2="612" y2="170" stroke="#059669" stroke-width="2"/>
    <line x1="648" y1="172" x2="692" y2="192" stroke="#059669" stroke-width="2"/>
    <line x1="556" y1="197" x2="588" y2="222" stroke="#059669" stroke-width="2"/>
    <text x="630" y="169" font-size="11" fill="#065f46" text-anchor="middle" font-weight="700">수정</text>
  </g>
  <text x="463" y="256" font-size="11.5" fill="#047857">→ 승인된 그래프 수정을 지시문 증분 편집으로 반영</text>

  <!-- Bottom: pass3 bar chart -->
  <text x="30" y="300" font-size="15" font-weight="700" fill="#0f172a">strict reliability (pass³) · 최종 체크포인트</text>
  <g font-size="12" fill="#334155">
    <!-- baseline scale: max 0.70 -> width 560 -->
    <!-- Gemini 2.5 Flash zero-shot 0.091 -->
    <text x="30" y="332">Gemini 2.5 Flash (zero-shot)</text>
    <rect x="250" y="320" width="73" height="18" rx="3" fill="#94a3b8"/>
    <text x="330" y="334" font-weight="700" fill="#475569">0.091</text>
    <!-- flat HCE 0.191 -->
    <text x="30" y="360">평문 HCE baseline</text>
    <rect x="250" y="348" width="153" height="18" rx="3" fill="#f59e0b"/>
    <text x="410" y="362" font-weight="700" fill="#b45309">0.191</text>
    <!-- Gemini 3.1 Pro zero-shot 0.242 -->
    <text x="30" y="388">Gemini 3.1 Pro (zero-shot 참조)</text>
    <rect x="250" y="376" width="194" height="18" rx="3" fill="#3b82f6"/>
    <text x="451" y="390" font-weight="700" fill="#1d4ed8">0.242</text>
    <!-- GRACE 0.673 -->
    <text x="30" y="416" font-weight="700" fill="#065f46">GRACE (최종)</text>
    <rect x="250" y="404" width="538" height="18" rx="3" fill="#10b981"/>
    <text x="700" y="418" font-weight="700" fill="#065f46">0.673</text>
  </g>
  <text x="30" y="446" font-size="11.5" fill="#64748b">같은 held-out 세트에서 GRACE가 더 큰 상위 모델 zero-shot(0.242)도 상회 · 분포 이동 프로토콜 · 5회 반복 평균</text>
</svg>
