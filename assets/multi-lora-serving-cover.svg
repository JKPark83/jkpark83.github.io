<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" role="img" aria-label="왼쪽 '이전'에서는 고객마다 통째로 파인튜닝한 7B 모델을 GPU 한 대씩 올려 GPU가 여러 대 필요하다. 오른쪽 '이후'에서는 큰 base 모델 한 개만 GPU 한 대에 올려 두고, 고객별로는 몇 MB짜리 작은 LoRA 어댑터만 갈아끼워 한 대로 다 처리한다.">
  <style>
    .cv-bg{fill:#f8fafc}
    .cv-card{fill:#ffffff;stroke:#cbd5e1}
    .cv-mut{fill:#64748b}
    .cv-fg{fill:#0f172a}
    .cv-red{fill:#e11d48}
    .cv-grn{fill:#0d9488}
    .cv-ind{fill:#4f46e5}
    .cv-amb{fill:#d97706}
    @media (prefers-color-scheme:dark){
      .cv-bg{fill:#0b1220}
      .cv-card{fill:#111827;stroke:#334155}
      .cv-mut{fill:#94a3b8}
      .cv-fg{fill:#e5e7eb}
      .cv-red{fill:#fb7185}
      .cv-grn{fill:#2dd4bf}
      .cv-ind{fill:#818cf8}
      .cv-amb{fill:#fbbf24}
    }
  </style>
  <rect class="cv-bg" x="0" y="0" width="820" height="420" rx="18"/>

  <!-- divider -->
  <line x1="410" y1="40" x2="410" y2="384" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 6" opacity="0.6"/>

  <!-- LEFT: before -->
  <text class="cv-red" x="200" y="48" font-size="22" font-weight="800" text-anchor="middle" font-family="sans-serif">이전 — 고객마다 통째로 파인튜닝</text>

  <!-- 3 full models each on its own GPU -->
  <g font-family="sans-serif">
    <rect class="cv-card" x="42" y="76" width="316" height="86" rx="12" stroke-width="1.5"/>
    <rect class="cv-red" x="60" y="96" width="150" height="46" rx="8" opacity="0.16"/>
    <text class="cv-fg" x="135" y="118" font-size="14" font-weight="700" text-anchor="middle">7B 모델 · 고객 A</text>
    <text class="cv-mut" x="135" y="136" font-size="12" text-anchor="middle">통째로 14GB</text>
    <text class="cv-mut" x="300" y="112" font-size="13" text-anchor="middle">GPU</text>
    <text class="cv-red" x="300" y="132" font-size="22" font-weight="800" text-anchor="middle">🟥</text>

    <rect class="cv-card" x="42" y="172" width="316" height="86" rx="12" stroke-width="1.5"/>
    <rect class="cv-red" x="60" y="192" width="150" height="46" rx="8" opacity="0.16"/>
    <text class="cv-fg" x="135" y="214" font-size="14" font-weight="700" text-anchor="middle">7B 모델 · 고객 B</text>
    <text class="cv-mut" x="135" y="232" font-size="12" text-anchor="middle">통째로 14GB</text>
    <text class="cv-mut" x="300" y="208" font-size="13" text-anchor="middle">GPU</text>
    <text class="cv-red" x="300" y="228" font-size="22" font-weight="800" text-anchor="middle">🟥</text>

    <rect class="cv-card" x="42" y="268" width="316" height="86" rx="12" stroke-width="1.5"/>
    <rect class="cv-red" x="60" y="288" width="150" height="46" rx="8" opacity="0.16"/>
    <text class="cv-fg" x="135" y="310" font-size="14" font-weight="700" text-anchor="middle">7B 모델 · 고객 C</text>
    <text class="cv-mut" x="135" y="328" font-size="12" text-anchor="middle">통째로 14GB</text>
    <text class="cv-mut" x="300" y="304" font-size="13" text-anchor="middle">GPU</text>
    <text class="cv-red" x="300" y="324" font-size="22" font-weight="800" text-anchor="middle">🟥</text>
  </g>
  <text class="cv-red" x="200" y="378" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">고객 N명 → GPU N대. 비용이 선형으로 폭발</text>

  <!-- RIGHT: after -->
  <text class="cv-grn" x="620" y="48" font-size="22" font-weight="800" text-anchor="middle" font-family="sans-serif">이후 — base 하나 + 어댑터만 교체</text>

  <g font-family="sans-serif">
    <!-- single GPU box holding one base -->
    <rect class="cv-card" x="462" y="76" width="316" height="180" rx="12" stroke-width="2"/>
    <text class="cv-mut" x="620" y="98" font-size="13" text-anchor="middle">GPU 1대 🟩</text>
    <rect class="cv-ind" x="500" y="112" width="240" height="60" rx="10" opacity="0.18"/>
    <rect x="500" y="112" width="240" height="60" rx="10" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
    <text class="cv-ind" x="620" y="138" font-size="15" font-weight="800" text-anchor="middle">base 7B (고정)</text>
    <text class="cv-mut" x="620" y="158" font-size="12" text-anchor="middle">딱 한 번만 올린다 · 14GB</text>

    <!-- tiny adapter chips -->
    <rect class="cv-amb" x="500" y="188" width="66" height="46" rx="8" opacity="0.9"/>
    <text x="533" y="210" font-size="12" font-weight="800" text-anchor="middle" fill="#1a1200">A</text>
    <text x="533" y="226" font-size="10" text-anchor="middle" fill="#1a1200">~9MB</text>
    <rect class="cv-amb" x="576" y="188" width="66" height="46" rx="8" opacity="0.9"/>
    <text x="609" y="210" font-size="12" font-weight="800" text-anchor="middle" fill="#1a1200">B</text>
    <text x="609" y="226" font-size="10" text-anchor="middle" fill="#1a1200">~9MB</text>
    <rect class="cv-amb" x="652" y="188" width="66" height="46" rx="8" opacity="0.9"/>
    <text x="685" y="210" font-size="12" font-weight="800" text-anchor="middle" fill="#1a1200">C</text>
    <text x="685" y="226" font-size="10" text-anchor="middle" fill="#1a1200">~9MB</text>

    <text class="cv-grn" x="620" y="286" font-size="14" font-weight="700" text-anchor="middle">LoRA 어댑터 = 몇 MB짜리 작은 파일</text>
    <text class="cv-fg" x="620" y="312" font-size="14" text-anchor="middle">요청마다 필요한 어댑터만 골라 함께 계산</text>
    <text class="cv-grn" x="620" y="342" font-size="15" font-weight="800" text-anchor="middle">고객 수천 명이라도 GPU는 그대로</text>
  </g>
  <text class="cv-grn" x="620" y="378" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">= 멀티-LoRA 서빙</text>
</svg>
