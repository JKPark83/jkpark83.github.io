<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="720" height="380" fill="#0f172a"/>
  <text x="360" y="34" text-anchor="middle" fill="#f8fafc" font-size="19" font-weight="700">Gemini 3.6 Flash — 저비용·토큰 효율 (검증된 수치)</text>

  <!-- output price bars -->
  <text x="180" y="70" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">출력 단가 (USD / 1M 토큰)</text>
  <!-- axis baseline -->
  <line x1="80" y1="300" x2="300" y2="300" stroke="#334155" stroke-width="1.5"/>

  <!-- 3.5 Flash: 9.00 -->
  <rect x="105" y="120" width="70" height="180" rx="5" fill="#64748b"/>
