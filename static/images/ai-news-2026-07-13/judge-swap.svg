<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="'Segoe UI',Roboto,'Helvetica Neue',sans-serif">
  <rect width="720" height="430" fill="#0f172a"/>
  <text x="24" y="36" fill="#f8fafc" font-size="20" font-weight="700">판사(Judge)를 바꾸면 측정값이 바뀐다</text>
  <text x="24" y="58" fill="#94a3b8" font-size="13">같은 후보 응답이 고정돼도 평가자만 바뀌면 점수가 이동 — 측정 타당성 문제</text>

  <!-- fixed candidate -->
  <g>
    <rect x="24" y="90" width="150" height="90" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="99" y="120" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">후보 응답</text>
    <text x="99" y="142" fill="#94a3b8" font-size="12" text-anchor="middle">고정 (fixed)</text>
    <text x="99" y="162" fill="#94a3b8" font-size="12" text-anchor="middle">변하지 않음</text>
  </g>

  <!-- arrows -->
  <g stroke="#475569" stroke-width="2" fill="none" marker-end="url(#a)">
    <path d="M174 120 L250 118"/>
    <path d="M174 152 L250 210"/>
  </g>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- judge A -->
  <g>
    <rect x="256" y="86" width="180" height="70" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="268" y="110" fill="#38bdf8" font-size="13" font-weight="700">판사 A</text>
    <text x="268" y="130" fill="#e2e8f0" font-size="11">Qwen3 1.7B → 4B</text>
    <text x="268" y="147" fill="#34d399" font-size="11">✓ 인접 업그레이드 견고</text>
  </g>
  <!-- judge B -->
  <g>
    <rect x="256" y="176" width="180" height="70" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
    <text x="268" y="200" fill="#f472b6" font-size="13" font-weight="700">판사 B</text>
    <text x="268" y="220" fill="#e2e8f0" font-size="11">MiniMax M2 → M2.7</text>
    <text x="268" y="237" fill="#fbbf24" font-size="11">✗ 인접 릴리즈 = 교체 불가</text>
  </g>

  <!-- diverging scores -->
  <g stroke="#475569" stroke-width="2" fill="none" marker-end="url(#a)">
    <path d="M436 120 L512 118"/>
    <path d="M436 210 L512 212"/>
  </g>
  <g>
    <rect x="518" y="90" width="178" height="62" rx="10" fill="#052e2b" stroke="#34d399" stroke-width="1.5"/>
    <text x="607" y="116" fill="#a7f3d0" font-size="13" font-weight="700" text-anchor="middle">점수 X</text>
    <text x="607" y="138" fill="#6ee7b7" font-size="11" text-anchor="middle">일관된 측정</text>
  </g>
  <g>
    <rect x="518" y="180" width="178" height="62" rx="10" fill="#3b0d1f" stroke="#f472b6" stroke-width="1.5"/>
    <text x="607" y="206" fill="#fbcfe8" font-size="13" font-weight="700" text-anchor="middle">점수 Y ≠ X</text>
    <text x="607" y="228" fill="#f9a8d4" font-size="11" text-anchor="middle">숨은 방향 편향</text>
  </g>

  <!-- bottom: audit trail -->
  <rect x="24" y="286" width="672" height="118" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="40" y="314" fill="#c4b5fd" font-size="14" font-weight="700">그래서 판사 리포트에 반드시 넣을 것 (audit trail)</text>
  <text x="40" y="342" fill="#e2e8f0" font-size="12">① 데이터셋 슬라이스별 점수    ② 편향 프로브(위치·장황함)</text>
  <text x="40" y="366" fill="#e2e8f0" font-size="12">③ 오류 상관(correlated error) 추정 — 반복 샘플 배심은 상관 오류엔 무력</text>
  <text x="40" y="390" fill="#e2e8f0" font-size="12">④ 프로토콜 로그(파서·폴백) — 없으면 '토론이 결정을 바꿨다' 귀인 불가</text>

  <text x="518" y="278" fill="#64748b" font-size="10">출처: arXiv 2607.08535 · 생성 SVG</text>
</svg>
