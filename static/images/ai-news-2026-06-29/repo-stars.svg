  <rect x="24" y="170" width="355" height="26" rx="5" fill="#a855f7"/>
  <text x="389" y="188" fill="#e9d5ff" font-size="13" font-weight="700">204.9k★</text>

  <!-- cc-switch: 109932 -> 190 -->
  <text x="24" y="224" fill="#cbd5e1" font-size="13">farion1231/cc-switch</text>
  <rect x="24" y="232" width="660" height="26" rx="5" fill="#1b2230"/>
