<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="사용자와 에이전트 사이에 '기억층'을 두고, 장기 기억을 의미·일화·절차 세 종류로 저장해 매 세션 이어 쓰는 에이전트 메모리 구조 표지">
  <defs>
    <linearGradient id="am-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101f33"/>
    </linearGradient>
    <linearGradient id="am-mem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="am-sem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="am-epi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="am-pro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <marker id="am-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a5b4fc"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#am-bg)"/>

  <text x="600" y="86" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="46" font-weight="800">매번 처음 만나는 AI는 그만</text>
  <text x="600" y="130" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="25" font-weight="500">에이전트에게 ‘기억’을 붙이는 법 — 메모리 엔지니어링</text>

  <!-- 사용자 -->
  <rect x="70" y="250" width="180" height="92" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="160" y="300" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="24" font-weight="700">사용자</text>
  <text x="160" y="326" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="16">세션 1 · 2 · 3 …</text>

  <!-- 기억층 -->
  <rect x="500" y="232" width="200" height="128" rx="18" fill="url(#am-mem)"/>
  <text x="600" y="288" text-anchor="middle" fill="#0b1220" font-family="system-ui,sans-serif" font-size="26" font-weight="800">기억층</text>
  <text x="600" y="316" text-anchor="middle" fill="#0b1220" font-family="system-ui,sans-serif" font-size="16" font-weight="600">memory layer</text>
  <text x="600" y="340" text-anchor="middle" fill="#1e1b4b" font-family="system-ui,sans-serif" font-size="14">추출 · 통합 · 검색</text>

  <!-- LLM -->
  <rect x="950" y="250" width="180" height="92" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="1040" y="300" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="24" font-weight="700">LLM 에이전트</text>
  <text x="1040" y="326" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="15">상태가 없음(stateless)</text>

  <!-- 화살표 -->
  <line x1="250" y1="296" x2="492" y2="296" stroke="#a5b4fc" stroke-width="3" marker-end="url(#am-ar)"/>
  <line x1="700" y1="296" x2="942" y2="296" stroke="#a5b4fc" stroke-width="3" marker-end="url(#am-ar)"/>
  <text x="372" y="282" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="15">대화</text>
  <text x="821" y="282" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="15">관련 기억만 주입</text>

  <!-- 장기 기억 3종 -->
  <g font-family="system-ui,sans-serif">
    <rect x="360" y="440" width="150" height="110" rx="14" fill="url(#am-sem)"/>
    <text x="435" y="486" text-anchor="middle" fill="#062a1e" font-size="22" font-weight="800">의미</text>
    <text x="435" y="512" text-anchor="middle" fill="#062a1e" font-size="15" font-weight="600">semantic</text>
    <text x="435" y="534" text-anchor="middle" fill="#06402b" font-size="13">사실 · 선호</text>

    <rect x="525" y="440" width="150" height="110" rx="14" fill="url(#am-epi)"/>
    <text x="600" y="486" text-anchor="middle" fill="#3a2206" font-size="22" font-weight="800">일화</text>
    <text x="600" y="512" text-anchor="middle" fill="#3a2206" font-size="15" font-weight="600">episodic</text>
    <text x="600" y="534" text-anchor="middle" fill="#5a3406" font-size="13">언제 · 무슨 일</text>

    <rect x="690" y="440" width="150" height="110" rx="14" fill="url(#am-pro)"/>
    <text x="765" y="486" text-anchor="middle" fill="#3f0a1b" font-size="22" font-weight="800">절차</text>
    <text x="765" y="512" text-anchor="middle" fill="#3f0a1b" font-size="15" font-weight="600">procedural</text>
    <text x="765" y="534" text-anchor="middle" fill="#5a0f28" font-size="13">방법 · 규칙</text>
  </g>

  <line x1="600" y1="362" x2="600" y2="434" stroke="#a5b4fc" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#am-ar)"/>
  <text x="600" y="408" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="15">장기 기억(long-term memory)</text>
</svg>
