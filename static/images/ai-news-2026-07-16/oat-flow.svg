<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="100%" font-family="'Segoe UI',system-ui,'Apple SD Gothic Neo',sans-serif">
  <rect width="820" height="400" fill="#ffffff" rx="14"/>
  <text x="40" y="44" fill="#0f172a" font-size="22" font-weight="700">OAT: 성공 궤적만 학습해 실패 스텝 짚기</text>
  <text x="40" y="70" fill="#64748b" font-size="14">라벨된 실패 데이터 불필요 · 성공 궤적 100개로 학습 (arXiv 2607.12747)</text>

  <!-- step boxes -->
  <g>
    <rect x="40" y="110" width="170" height="94" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="125" y="142" text-anchor="middle" fill="#065f46" font-size="14" font-weight="700">① 성공 궤적</text>
    <text x="125" y="166" text-anchor="middle" fill="#047857" font-size="13">정상 실행 로그</text>
    <text x="125" y="188" text-anchor="middle" fill="#047857" font-size="13">100개만 수집</text>
  </g>
  <g>
    <rect x="255" y="110" width="170" height="94" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="340" y="142" text-anchor="middle" fill="#1e3a8a" font-size="14" font-weight="700">② One-class</text>
    <text x="340" y="164" text-anchor="middle" fill="#1d4ed8" font-size="13">Neural CDE로</text>
    <text x="340" y="186" text-anchor="middle" fill="#1d4ed8" font-size="13">정상 흐름 학습</text>
  </g>
  <g>
    <rect x="470" y="110" width="170" height="94" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="555" y="142" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="700">③ 실패 궤적</text>
    <text x="555" y="164" text-anchor="middle" fill="#dc2626" font-size="13">이상치로</text>
    <text x="555" y="186" text-anchor="middle" fill="#dc2626" font-size="13">입력·채점</text>
  </g>
  <g>
    <rect x="670" y="110" width="110" height="94" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="725" y="150" text-anchor="middle" fill="#92400e" font-size="14" font-weight="700">④ 이탈</text>
    <text x="725" y="172" text-anchor="middle" fill="#b45309" font-size="13">스텝 지목</text>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none">
    <path d="M210 157 L253 157" marker-end="url(#ar)"/>
    <path d="M425 157 L468 157" marker-end="url(#ar)"/>
    <path d="M640 157 L668 157" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- result badges -->
  <g>
    <rect x="40" y="248" width="360" height="72" rx="10" fill="#0f172a"/>
    <text x="60" y="278" fill="#e2e8f0" font-size="15" font-weight="700">속도</text>
    <text x="220" y="290" text-anchor="middle" fill="#38bdf8" font-size="28" font-weight="800">200~5000×</text>
    <text x="60" y="306" fill="#94a3b8" font-size="12">프롬프트 기반 베이스라인 대비 빠름</text>
  </g>
  <g>
    <rect x="420" y="248" width="360" height="72" rx="10" fill="#0f172a"/>
    <text x="440" y="278" fill="#e2e8f0" font-size="15" font-weight="700">F1</text>
    <text x="600" y="290" text-anchor="middle" fill="#34d399" font-size="26" font-weight="800">+20% / +7%</text>
    <text x="440" y="306" fill="#94a3b8" font-size="12">인-도메인 / 분포 밖(OOD)</text>
  </g>

  <text x="40" y="356" fill="#64748b" font-size="12.5">시사점: 실패 라벨링 없이도 "정상 로그"만 있으면 실패 원인 스텝을 저비용으로 자동 탐지 가능.</text>
</svg>
