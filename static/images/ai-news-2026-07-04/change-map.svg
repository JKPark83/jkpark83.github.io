  <rect x="290" y="126" width="180" height="198" rx="8" fill="#fff" stroke="#7bbf93"/>
  <text x="380" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#111">LongCat-2.0</text>
  <text x="380" y="172" text-anchor="middle" font-size="11.5" fill="#555">Meituan · 6/30 · MIT</text>
  <line x1="306" y1="184" x2="454" y2="184" stroke="#cde8d5"/>
  <text x="380" y="204" text-anchor="middle" font-size="12" fill="#333">1.6T MoE (활성 ~33–56B/토큰)</text>
  <text x="380" y="224" text-anchor="middle" font-size="12" fill="#333">1M 컨텍스트</text>
