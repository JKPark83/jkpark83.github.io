<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Segoe UI',Roboto,'Helvetica Neue',sans-serif">
  <rect width="720" height="400" fill="#0f172a"/>
  <text x="24" y="36" fill="#f8fafc" font-size="20" font-weight="700">프론티어 모델이 '판사'일 필요는 없다 — 단, 보정은 필수</text>
  <text x="24" y="58" fill="#94a3b8" font-size="13">Deep-Research 인용 품질 루브릭: 8개 판사 · 3개 패밀리 · 1,248개 판정(378개 하드케이스)</text>

  <!-- left: verified stat callouts -->
  <g>
    <rect x="24" y="86" width="330" height="120" rx="10" fill="#052e2b" stroke="#34d399" stroke-width="1.5"/>
    <text x="40" y="112" fill="#6ee7b7" font-size="13" font-weight="700">source-relevance 최고</text>
    <text x="40" y="152" fill="#a7f3d0" font-size="34" font-weight="700">F1 0.908</text>
    <text x="40" y="176" fill="#e2e8f0" font-size="12">GPT-5-mini (κ=0.636) — 값싼 모델이 선두</text>
    <text x="40" y="196" fill="#94a3b8" font-size="11">factual-support는 판사 간 통계적으로 구분 불가</text>
  </g>

  <!-- right: F1 hides bias -->
  <g>
    <rect x="366" y="86" width="330" height="120" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="382" y="112" fill="#fbbf24" font-size="13" font-weight="700">스칼라 F1이 가리는 것</text>
    <text x="382" y="138" fill="#e2e8f0" font-size="12">같은 F1이라도 판사마다 다름 ↓</text>
    <text x="382" y="162" fill="#fca5a5" font-size="12">· pass-rate drift (합격률 표류)</text>
    <text x="382" y="182" fill="#fca5a5" font-size="12">· false positive / false negative rate</text>
    <text x="382" y="200" fill="#94a3b8" font-size="11">이 방향 편향을 RL 보상 루프가 그대로 학습</text>
  </g>

  <!-- bottom takeaway -->
  <rect x="24" y="228" width="672" height="150" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="40" y="256" fill="#c4b5fd" font-size="14" font-weight="700">빌더 체크리스트 — 판사를 보상/평가로 쓰기 전에</text>
  <text x="40" y="284" fill="#e2e8f0" font-size="12">1) 골드 라벨 소량으로 판사 F1 + κ(일치도)를 먼저 측정한다</text>
  <text x="40" y="308" fill="#e2e8f0" font-size="12">2) F1만 보지 말고 FPR·FNR·합격률 표류 = '방향'을 함께 리포트한다</text>
  <text x="40" y="332" fill="#e2e8f0" font-size="12">3) 통과 기준(gold)을 명시해 하드케이스를 사람이 재심(378/1,248)</text>
  <text x="40" y="356" fill="#e2e8f0" font-size="12">4) 비용: 최상위 모델 대신 mini급으로 시작해 보정으로 신뢰 확보</text>

  <text x="520" y="222" fill="#64748b" font-size="10">출처: arXiv 2607.08700 · 생성 SVG</text>
</svg>
