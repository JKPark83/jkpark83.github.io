  <line x1="240" y1="215" x2="270" y2="215" stroke="#888" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="488" y1="215" x2="518" y2="215" stroke="#888" stroke-width="2" marker-end="url(#ar)"/>
