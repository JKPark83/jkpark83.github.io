<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="100%" height="auto" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#0f172a"/>
  <text x="380" y="34" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Agent Skill 동작 — 점진적 로딩(progressive disclosure)</text>

  <!-- step boxes -->
  <rect x="30" y="70" width="160" height="90" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">1. 메타데이터만</text>
  <text x="110" y="122" text-anchor="middle" fill="#cbd5e1" font-size="11">name + description</text>
  <text x="110" y="140" text-anchor="middle" fill="#cbd5e1" font-size="11">항상 컨텍스트에</text>

  <rect x="220" y="70" width="160" height="90" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">2. 필요 판단</text>
  <text x="300" y="122" text-anchor="middle" fill="#cbd5e1" font-size="11">작업과 매칭되면</text>
  <text x="300" y="140" text-anchor="middle" fill="#cbd5e1" font-size="11">SKILL.md 본문 로드</text>

  <rect x="410" y="70" width="160" height="90" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="490" y="100" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">3. 리소스 사용</text>
  <text x="490" y="122" text-anchor="middle" fill="#cbd5e1" font-size="11">스크립트·템플릿·</text>
  <text x="490" y="140" text-anchor="middle" fill="#cbd5e1" font-size="11">참고문서 실행</text>

  <rect x="600" y="70" width="130" height="90" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="665" y="100" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">4. 결과</text>
  <text x="665" y="122" text-anchor="middle" fill="#cbd5e1" font-size="11">반복 가능한</text>
  <text x="665" y="140" text-anchor="middle" fill="#cbd5e1" font-size="11">전문 작업 완료</text>

  <!-- arrows -->
  <g stroke="#64748b" stroke-width="2" fill="#64748b">
    <line x1="190" y1="115" x2="216" y2="115"/><polygon points="216,110 224,115 216,120"/>
    <line x1="380" y1="115" x2="406" y2="115"/><polygon points="406,110 414,115 406,120"/>
    <line x1="570" y1="115" x2="596" y2="115"/><polygon points="596,110 604,115 596,120"/>
  </g>

  <!-- benefit -->
  <rect x="30" y="200" width="700" height="54" rx="10" fill="#172554"/>
  <text x="380" y="224" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">핵심 이득: 토큰을 아끼면서 능력 추가 — 전체 매뉴얼이 아니라 한 줄 설명만 상주</text>
  <text x="380" y="244" text-anchor="middle" fill="#cbd5e1" font-size="12">필요할 때만 본문을 펼쳐 컨텍스트 윈도를 덜 먹는다</text>

  <!-- cross tool -->
  <rect x="30" y="278" width="340" height="56" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="200" y="302" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">Claude Code</text>
  <text x="200" y="322" text-anchor="middle" fill="#cbd5e1" font-size="11">/plugin marketplace add anthropics/skills</text>

  <rect x="390" y="278" width="340" height="56" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="560" y="302" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">Codex</text>
  <text x="560" y="322" text-anchor="middle" fill="#cbd5e1" font-size="11">docs/skills.md — 같은 SKILL.md 포맷</text>
</svg>
