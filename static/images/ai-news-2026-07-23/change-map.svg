<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="720" height="430" fill="#0f172a"/>
