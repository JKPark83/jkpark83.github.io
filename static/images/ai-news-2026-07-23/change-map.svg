  <!-- connector -->
  <line x1="328" y1="240" x2="392" y2="240" stroke="#475569" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="360" y="232" text-anchor="middle" fill="#94a3b8" font-size="10">연결</text>
