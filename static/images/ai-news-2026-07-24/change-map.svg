  <text x="426" y="177" fill="#cbd5e1" font-size="11">"터진 곳" 말고 "터뜨린 곳"을 찾는다</text>

  <rect x="412" y="194" width="260" height="60" rx="9" fill="#0b1220" stroke="#a78bfa"/>
  <text x="426" y="217" fill="#f8fafc" font-size="13" font-weight="700">Twin Agent (2607.19595)</text>
  <text x="426" y="236" fill="#cbd5e1" font-size="11.5">Explore/Safe 권한 분리로 프롬프트 주입 방어</text>
