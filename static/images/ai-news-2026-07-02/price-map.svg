<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="720" height="360" fill="#0f1117"/>
  <text x="360" y="32" fill="#e6e6e6" font-size="19" font-weight="700" text-anchor="middle">에이전트 토큰 단가 비교 (USD / 1M tokens)</text>
  <text x="360" y="53" fill="#8b93a7" font-size="12" text-anchor="middle">GPT-5.6 계열 · Claude Sonnet 5 · 벤더 공개 단가 기준</text>

  <!-- legend -->
  <rect x="250" y="66" width="12" height="12" rx="2" fill="#58a6ff"/>
  <text x="268" y="76" fill="#8b93a7" font-size="12">입력(input)</text>
  <rect x="360" y="66" width="12" height="12" rx="2" fill="#f0883e"/>
  <text x="378" y="76" fill="#8b93a7" font-size="12">출력(output)</text>

  <!-- scale: $30 -> 470px => ~15.6 px/$ ; bars start x=150 -->
  <!-- GPT-5.6 Sol 5 / 30 -->
  <text x="140" y="110" fill="#e6e6e6" font-size="13" font-weight="700" text-anchor="end">GPT-5.6 Sol</text>
  <rect x="150" y="98" width="78" height="14" rx="3" fill="#58a6ff"/>
  <text x="234" y="110" fill="#9bd0ff" font-size="11">$5</text>
  <rect x="150" y="116" width="469" height="14" rx="3" fill="#f0883e"/>
  <text x="625" y="128" fill="#f5b98a" font-size="11">$30</text>

  <!-- GPT-5.6 Terra 2.5 / 15 -->
  <text x="140" y="162" fill="#e6e6e6" font-size="13" font-weight="700" text-anchor="end">GPT-5.6 Terra</text>
  <rect x="150" y="150" width="39" height="14" rx="3" fill="#58a6ff"/>
  <text x="195" y="162" fill="#9bd0ff" font-size="11">$2.5</text>
  <rect x="150" y="168" width="234" height="14" rx="3" fill="#f0883e"/>
  <text x="390" y="180" fill="#f5b98a" font-size="11">$15</text>

  <!-- GPT-5.6 Luna 1 / 6 -->
  <text x="140" y="214" fill="#e6e6e6" font-size="13" font-weight="700" text-anchor="end">GPT-5.6 Luna</text>
  <rect x="150" y="202" width="16" height="14" rx="3" fill="#58a6ff"/>
  <text x="172" y="214" fill="#9bd0ff" font-size="11">$1</text>
  <rect x="150" y="220" width="94" height="14" rx="3" fill="#f0883e"/>
  <text x="250" y="232" fill="#f5b98a" font-size="11">$6</text>

  <!-- Claude Sonnet 5 3 / 15 (post-promo) -->
  <text x="140" y="266" fill="#e6e6e6" font-size="13" font-weight="700" text-anchor="end">Claude Sonnet 5</text>
  <rect x="150" y="254" width="47" height="14" rx="3" fill="#58a6ff"/>
  <text x="203" y="266" fill="#9bd0ff" font-size="11">$3</text>
  <rect x="150" y="272" width="234" height="14" rx="3" fill="#f0883e"/>
  <text x="390" y="284" fill="#f5b98a" font-size="11">$15</text>

  <text x="150" y="322" fill="#8b93a7" font-size="11.5">· Sonnet 5는 프로모($2/$10) 종료 후 정가 $3/$15 기준.</text>
  <text x="150" y="340" fill="#8b93a7" font-size="11.5">· GPT-5.6 Sol은 한정 프리뷰 — 지금은 대량 트래픽에 못 붙임.</text>
</svg>
