<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="760" height="340" fill="#0f172a"/>
  <text x="24" y="34" fill="#f1f5f9" font-size="18" font-weight="700">MCP 2026-07-28 RC — stateful → stateless 코어</text>

  <!-- before -->
  <text x="24" y="70" fill="#f87171" font-size="14" font-weight="700">AS-IS · 상태 유지</text>
  <rect x="24" y="84" width="130" height="46" rx="9" fill="#1e293b" stroke="#64748b"/>
  <text x="89" y="112" fill="#e2e8f0" font-size="12.5" text-anchor="middle">Agent</text>

  <rect x="210" y="84" width="150" height="46" rx="9" fill="#1e293b" stroke="#f87171"/>
  <text x="285" y="105" fill="#fca5a5" font-size="12" text-anchor="middle">initialize 핸드셰이크</text>
  <text x="285" y="121" fill="#94a3b8" font-size="11" text-anchor="middle">sticky 세션 필요</text>

  <rect x="410" y="84" width="150" height="46" rx="9" fill="#1e293b" stroke="#64748b"/>
  <text x="485" y="105" fill="#e2e8f0" font-size="12.5" text-anchor="middle">서버 인스턴스 A</text>
  <text x="485" y="121" fill="#94a3b8" font-size="11" text-anchor="middle">세션 상태 보관</text>

  <line x1="154" y1="107" x2="208" y2="107" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="360" y1="107" x2="408" y2="107" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="612" y="100" fill="#f87171" font-size="11.5">고정 라우팅 없으면</text>
  <text x="612" y="116" fill="#f87171" font-size="11.5">세션 유실</text>

  <line x1="24" y1="160" x2="736" y2="160" stroke="#334155" stroke-dasharray="4 4"/>

  <!-- after -->
  <text x="24" y="196" fill="#4ade80" font-size="14" font-weight="700">TO-BE · stateless 코어 (SEP-2575)</text>
  <rect x="24" y="210" width="130" height="46" rx="9" fill="#1e293b" stroke="#64748b"/>
  <text x="89" y="238" fill="#e2e8f0" font-size="12.5" text-anchor="middle">Agent</text>

  <rect x="210" y="210" width="150" height="46" rx="9" fill="#1e293b" stroke="#4ade80"/>
  <text x="285" y="231" fill="#86efac" font-size="12" text-anchor="middle">핸드셰이크 제거</text>
  <text x="285" y="247" fill="#94a3b8" font-size="11" text-anchor="middle">round-robin LB</text>

  <g>
    <rect x="410" y="196" width="150" height="34" rx="8" fill="#1e293b" stroke="#4ade80"/>
    <text x="485" y="218" fill="#e2e8f0" font-size="12" text-anchor="middle">인스턴스 A</text>
    <rect x="410" y="236" width="150" height="34" rx="8" fill="#1e293b" stroke="#4ade80"/>
    <text x="485" y="258" fill="#e2e8f0" font-size="12" text-anchor="middle">인스턴스 B (아무거나)</text>
  </g>

  <line x1="154" y1="233" x2="208" y2="233" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="360" y1="233" x2="408" y2="233" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="612" y="228" fill="#4ade80" font-size="11.5">공유 세션 저장소</text>
  <text x="612" y="244" fill="#4ade80" font-size="11.5">불필요</text>

  <text x="24" y="316" fill="#64748b" font-size="11">추가: Extensions(MCP Apps·Tasks), OAuth 2.1/OIDC 인가 강화, 12개월 폐기 정책 · 출처: blog.modelcontextprotocol.io</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
