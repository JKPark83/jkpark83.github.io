<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" width="100%" height="auto" role="img" aria-label="오늘의 AI 변화 지도 - 오케스트레이션 효율">
  <rect width="720" height="420" fill="#0f1117"/>
  <text x="360" y="38" text-anchor="middle" fill="#e6e6e6" font-size="22" font-weight="700">오늘의 AI 변화 지도</text>
  <text x="360" y="62" text-anchor="middle" fill="#7dd3fc" font-size="14">줄기: 에이전트 오케스트레이션 효율 — "언제·어떻게 도구를 호출하나"</text>

  <!-- center -->
  <ellipse cx="360" cy="220" rx="96" ry="46" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="360" y="214" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">오케스트레이션</text>
  <text x="360" y="234" text-anchor="middle" fill="#94a3b8" font-size="12">효율 · 비용 · 컨텍스트</text>

  <!-- model node -->
  <rect x="40" y="110" width="190" height="70" rx="10" fill="#172033" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="135" y="135" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">모델 · 릴리즈</text>
  <text x="135" y="154" text-anchor="middle" fill="#cbd5e1" font-size="11">Codex 6월 대형 업데이트</text>
  <text x="135" y="170" text-anchor="middle" fill="#cbd5e1" font-size="11">Claude Code v2.1.185</text>

  <!-- paper node -->
  <rect x="490" y="110" width="190" height="70" rx="10" fill="#172033" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="585" y="135" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">논문</text>
  <text x="585" y="154" text-anchor="middle" fill="#cbd5e1" font-size="11">Utility-Guided Orch.</text>
  <text x="585" y="170" text-anchor="middle" fill="#cbd5e1" font-size="11">Tool-Use 진화 서베이</text>

  <!-- repo node -->
  <rect x="40" y="270" width="190" height="70" rx="10" fill="#172033" stroke="#34d399" stroke-width="1.5"/>
  <text x="135" y="295" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">오픈소스</text>
  <text x="135" y="314" text-anchor="middle" fill="#cbd5e1" font-size="11">LangGraph (그래프)</text>
  <text x="135" y="330" text-anchor="middle" fill="#cbd5e1" font-size="11">CrewAI (역할 분담)</text>

  <!-- tip node -->
  <rect x="490" y="270" width="190" height="70" rx="10" fill="#172033" stroke="#f472b6" stroke-width="1.5"/>
  <text x="585" y="295" text-anchor="middle" fill="#f472b6" font-size="13" font-weight="700">실전 팁</text>
  <text x="585" y="314" text-anchor="middle" fill="#cbd5e1" font-size="11">Codex Record &amp; Replay</text>
  <text x="585" y="330" text-anchor="middle" fill="#cbd5e1" font-size="11">CC 서브에이전트 격리</text>

  <!-- connectors -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <line x1="230" y1="145" x2="270" y2="200"/>
    <line x1="490" y1="145" x2="450" y2="200"/>
    <line x1="230" y1="305" x2="270" y2="245"/>
    <line x1="490" y1="305" x2="450" y2="245"/>
  </g>
</svg>
