  <!-- baseline -->
  <line x1="180" y1="210" x2="700" y2="210" stroke="#475569"/>

  <!-- OpenClaw ~346k -->
  <rect x="210" y="80" width="180" height="130" rx="5" fill="#38bdf8"/>
  <text x="300" y="72" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="700">~346k ★</text>
  <text x="300" y="230" text-anchor="middle" fill="#e2e8f0" font-size="12.5" font-weight="700">OpenClaw</text>
