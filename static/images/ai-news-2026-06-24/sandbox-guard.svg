<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="Claude Code sandbox.credentials 자격증명 차단 흐름">
  <rect width="820" height="360" fill="#0f172a"/>
  <text x="24" y="38" fill="#f8fafc" font-size="21" font-weight="700">Claude Code: sandbox.credentials 자격증명 차단</text>
  <text x="24" y="60" fill="#94a3b8" font-size="13">v2.1.187 — 샌드박스 셸이 비밀/자격증명에 닿지 못하게 (출처: 공식 changelog)</text>

  <!-- step 1 -->
  <rect x="24" y="92" width="220" height="150" rx="12" fill="#1e293b" stroke="#475569"/>
  <text x="40" y="120" fill="#7dd3fc" font-size="14" font-weight="700">① 에이전트 Bash</text>
  <text x="40" y="146" fill="#cbd5e1" font-size="12.5">cat ~/.aws/credentials</text>
  <text x="40" y="166" fill="#cbd5e1" font-size="12.5">env | grep TOKEN</text>
  <text x="40" y="186" fill="#cbd5e1" font-size="12.5">cat .env</text>
  <text x="40" y="220" fill="#94a3b8" font-size="12">샌드박스 안에서 실행</text>

  <!-- arrow -->
  <path d="M244 167 L300 167" stroke="#64748b" stroke-width="2" marker-end="url(#b)"/>

  <!-- step 2 guard -->
  <rect x="300" y="92" width="220" height="150" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="316" y="120" fill="#fde68a" font-size="14" font-weight="700">② 차단 레이어</text>
  <text x="316" y="146" fill="#cbd5e1" font-size="12.5">sandbox.credentials</text>
  <text x="316" y="166" fill="#cbd5e1" font-size="12.5">= true</text>
  <text x="316" y="194" fill="#fca5a5" font-size="12.5">자격증명 파일 차단</text>
  <text x="316" y="214" fill="#fca5a5" font-size="12.5">비밀 env 변수 가림</text>

  <!-- arrow -->
  <path d="M520 167 L576 167" stroke="#64748b" stroke-width="2" marker-end="url(#b)"/>

  <!-- step 3 result -->
  <rect x="576" y="92" width="220" height="150" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1.8"/>
  <text x="592" y="120" fill="#6ee7b7" font-size="14" font-weight="700">③ 결과</text>
  <text x="592" y="146" fill="#cbd5e1" font-size="12.5">명령은 실행되지만</text>
  <text x="592" y="166" fill="#cbd5e1" font-size="12.5">비밀은 노출 안 됨</text>
  <text x="592" y="194" fill="#cbd5e1" font-size="12.5">프롬프트 인젝션·</text>
  <text x="592" y="214" fill="#cbd5e1" font-size="12.5">유출 표면 축소</text>

  <!-- footer note -->
  <rect x="24" y="268" width="772" height="68" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="40" y="296" fill="#f8fafc" font-size="13" font-weight="600">🎯 언제: 셸 권한을 가진 에이전트를 CI·원격·미감독 환경에서 돌릴 때</text>
  <text x="40" y="320" fill="#cbd5e1" font-size="12.5">⚠ 정책이 아닌 안전망 — 자격증명은 별도 시크릿 매니저로 주입하는 설계가 우선</text>

  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
