  <!-- Agno ~41k (scaled: 41/346*130 ~= 15.4px) -->
  <rect x="490" y="194" width="180" height="16" rx="4" fill="#a78bfa"/>
  <text x="580" y="186" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">~41k ★</text>
  <text x="580" y="230" text-anchor="middle" fill="#e2e8f0" font-size="12.5" font-weight="700">Agno</text>
  <text x="580" y="247" text-anchor="middle" fill="#94a3b8" font-size="10.5">Python · 에이전트 플랫폼 런타임</text>

  <text x="140" y="90" fill="#64748b" font-size="10" text-anchor="end">높음</text>
