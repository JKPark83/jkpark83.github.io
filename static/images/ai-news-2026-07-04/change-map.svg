  <text x="132" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#b3261e">🔒 잠김 (프런티어)</text>
  <rect x="42" y="126" width="180" height="86" rx="8" fill="#fff" stroke="#e5a0a0"/>
  <text x="132" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#333">GPT-5.6 Sol</text>
  <text x="132" y="170" text-anchor="middle" font-size="11.5" fill="#666">6/26 프리뷰</text>
