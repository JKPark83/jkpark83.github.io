<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2단계 검색(리랭킹)을 나타낸 그림. 왼쪽의 큰 문서 더미에서 빠른 1차 검색(bi-encoder)이 넓게 후보 수십 개를 건져 올리고, 가운데 크로스 인코더 리랭커가 질문과 문서를 함께 읽어 정밀하게 다시 줄을 세워 상위 몇 개만 남기며, 오른쪽에서 그 알짜만 LLM에 전달되는 깔때기 모양. 넓게 뽑고(recall) 정밀하게 좁힌다(precision)는 2단계 구조를 보여 준다.">
  <defs>
    <linearGradient id="rkg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0c2a3a"/>
    </linearGradient>
    <linearGradient id="rk-bi" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="rk-ce" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="rk-llm" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#16a34a"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#rkg)"/>

  <text x="80" y="96" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="46" font-weight="800">넓게 뽑고, 정밀하게 좁힌다</text>
  <text x="80" y="150" fill="#7dd3fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="30" font-weight="700">2단계 검색과 리랭킹(reranking)</text>

  <!-- Stage labels -->
  <text x="230" y="235" fill="#7dd3fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">1차 검색 · bi-encoder</text>
  <text x="600" y="235" fill="#fcd34d" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">리랭커 · cross-encoder</text>
  <text x="985" y="235" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">LLM</text>

  <!-- Corpus (document pile) -->
  <g>
    <rect x="70" y="280" width="70" height="46" rx="6" fill="#1e3a4a" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="70" y="336" width="70" height="46" rx="6" fill="#1e3a4a" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="70" y="392" width="70" height="46" rx="6" fill="#1e3a4a" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="70" y="448" width="70" height="46" rx="6" fill="#1e3a4a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="530" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" text-anchor="middle">문서 100만 개</text>
  </g>

  <!-- Stage 1 funnel: wide -->
  <path d="M160 300 L360 350 L360 430 L160 476 Z" fill="url(#rk-bi)" opacity="0.85"/>
  <text x="262" y="378" fill="#082f49" font-family="ui-sans-serif,system-ui,sans-serif" font-size="20" font-weight="800" text-anchor="middle">top-50</text>
  <text x="262" y="402" fill="#082f49" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle">빠르게 · 넓게</text>

  <!-- candidates -->
  <g>
    <rect x="392" y="300" width="150" height="30" rx="5" fill="#173a4a" stroke="#38bdf8" stroke-width="1.2"/>
    <rect x="392" y="336" width="150" height="30" rx="5" fill="#173a4a" stroke="#38bdf8" stroke-width="1.2"/>
    <rect x="392" y="372" width="150" height="30" rx="5" fill="#173a4a" stroke="#38bdf8" stroke-width="1.2"/>
    <rect x="392" y="408" width="150" height="30" rx="5" fill="#173a4a" stroke="#38bdf8" stroke-width="1.2"/>
    <rect x="392" y="444" width="150" height="30" rx="5" fill="#173a4a" stroke="#38bdf8" stroke-width="1.2"/>
  </g>

  <!-- Stage 2 reranker box -->
  <rect x="560" y="292" width="90" height="190" rx="12" fill="url(#rk-ce)" opacity="0.92"/>
  <text x="605" y="380" fill="#3b1e00" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="800" text-anchor="middle">질문+</text>
  <text x="605" y="402" fill="#3b1e00" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="800" text-anchor="middle">문서</text>
  <text x="605" y="424" fill="#3b1e00" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="800" text-anchor="middle">함께</text>

  <!-- reranked top-n -->
  <g>
    <rect x="672" y="336" width="150" height="30" rx="5" fill="#3a2f0a" stroke="#fbbf24" stroke-width="1.6"/>
    <rect x="672" y="372" width="150" height="30" rx="5" fill="#3a2f0a" stroke="#fbbf24" stroke-width="1.6"/>
    <rect x="672" y="408" width="150" height="30" rx="5" fill="#3a2f0a" stroke="#fbbf24" stroke-width="1.6"/>
    <text x="747" y="356" fill="#fde68a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" text-anchor="middle">가장 알맞은 순</text>
  </g>
  <text x="747" y="470" fill="#fcd34d" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700" text-anchor="middle">top-3</text>

  <!-- arrow to LLM -->
  <path d="M832 387 L905 387" stroke="#86efac" stroke-width="3" marker-end="url(#rkarr)"/>
  <defs>
    <marker id="rkarr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#86efac"/></marker>
  </defs>

  <!-- LLM -->
  <rect x="915" y="330" width="120" height="120" rx="16" fill="url(#rk-llm)" opacity="0.92"/>
  <text x="975" y="398" fill="#052e16" font-family="ui-sans-serif,system-ui,sans-serif" font-size="30" font-weight="800" text-anchor="middle">LLM</text>

  <text x="600" y="580" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="20" text-anchor="middle">1차 검색은 recall을 벌고, 리랭커는 precision을 벌어 상위 몇 개만 LLM에 남긴다</text>
</svg>
