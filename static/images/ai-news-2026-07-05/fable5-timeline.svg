<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="820" height="300" rx="16" fill="#f8fafc"/>
  <text x="410" y="38" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Claude Fable 5 — 19일의 공백과 복귀</text>

  <line x1="60" y1="150" x2="760" y2="150" stroke="#cbd5e1" stroke-width="4"/>

  <!-- 6/9 launch -->
  <circle cx="110" cy="150" r="10" fill="#10b981"/>
  <text x="110" y="120" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700">6/9</text>
  <text x="110" y="185" text-anchor="middle" fill="#334155" font-size="12">출시</text>
  <text x="110" y="202" text-anchor="middle" fill="#64748b" font-size="11">Mythos급 플래그십</text>

  <!-- 6/12 export control -->
  <circle cx="270" cy="150" r="10" fill="#ef4444"/>
  <text x="270" y="120" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="700">6/12</text>
  <text x="270" y="185" text-anchor="middle" fill="#334155" font-size="12">수출통제 지시</text>
  <text x="270" y="202" text-anchor="middle" fill="#64748b" font-size="11">모델 오프라인</text>

  <!-- 6/30 lifted -->
  <circle cx="450" cy="150" r="10" fill="#f59e0b"/>
  <text x="450" y="120" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">6/30</text>
  <text x="450" y="185" text-anchor="middle" fill="#334155" font-size="12">통제 해제</text>
  <text x="450" y="202" text-anchor="middle" fill="#64748b" font-size="11">Fable 5 · Mythos 5</text>

  <!-- 7/1 redeploy -->
  <circle cx="610" cy="150" r="10" fill="#10b981"/>
  <text x="610" y="120" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700">7/1</text>
  <text x="610" y="185" text-anchor="middle" fill="#334155" font-size="12">전 채널 재배포</text>
  <text x="610" y="202" text-anchor="middle" fill="#64748b" font-size="11">Claude Code 포함</text>

  <!-- 7/7 window ends -->
  <circle cx="740" cy="150" r="10" fill="#6366f1"/>
  <text x="740" y="120" text-anchor="middle" fill="#3730a3" font-size="13" font-weight="700">7/7</text>
  <text x="740" y="185" text-anchor="middle" fill="#334155" font-size="12">무료 포함 종료</text>
  <text x="740" y="202" text-anchor="middle" fill="#64748b" font-size="11">이후 usage credits</text>

  <rect x="150" y="238" width="520" height="40" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="410" y="263" text-anchor="middle" fill="#3730a3" font-size="13" font-weight="700">👉 지금(7/5)은 무료 포함 구간 — 7/7 전 어려운 태스크를 Fable 5로 A/B</text>
</svg>
