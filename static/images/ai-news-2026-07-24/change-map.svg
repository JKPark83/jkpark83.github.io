  <text x="426" y="325" fill="#cbd5e1" font-size="11.5">Agno ~41k★ 에이전트 플랫폼 런타임</text>

  <text x="542" y="366" text-anchor="middle" fill="#64748b" font-size="11">→ 디버깅·보안을 에이전트 기본기로</text>
  <text x="542" y="392" text-anchor="middle" fill="#64748b" font-size="11">관측·권한분리를 처음부터 넣어라</text>

  <!-- connector -->
  <line x1="328" y1="245" x2="392" y2="245" stroke="#475569" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="360" y="238" text-anchor="middle" fill="#64748b" font-size="10">연결</text>
</svg>
