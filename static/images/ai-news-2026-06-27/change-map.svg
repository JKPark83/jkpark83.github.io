<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="760" height="430" fill="#0f1117"/>
  <text x="380" y="34" fill="#e8eaf0" font-size="20" font-weight="700" text-anchor="middle">오늘의 변화 지도 — 2026-06-27</text>
  <text x="380" y="56" fill="#8b93a7" font-size="13" text-anchor="middle">주제: 도구를 하나씩 호출하지 말고 "코드로" 묶어 실행</text>

  <!-- edges -->
  <g stroke="#4a5167" stroke-width="2" opacity="0.5">
    <line x1="380" y1="215" x2="170" y2="140" stroke="#4a5167"/>
    <line x1="380" y1="215" x2="590" y2="140" stroke="#4a5167"/>
    <line x1="380" y1="215" x2="150" y2="300" stroke="#4a5167"/>
    <line x1="380" y1="215" x2="380" y2="330" stroke="#4a5167"/>
    <line x1="380" y1="215" x2="610" y2="300" stroke="#4a5167"/>
  </g>

  <!-- center -->
  <g>
    <ellipse cx="380" cy="215" rx="110" ry="46" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
    <text x="380" y="208" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Code Mode</text>
    <text x="380" y="230" fill="#cdd9ff" font-size="12" text-anchor="middle">도구 호출 → 코드 한 블록</text>
  </g>

  <!-- node: Anthropic -->
  <g>
    <rect x="60" y="106" width="220" height="64" rx="10" fill="#161a24" stroke="#d97757" stroke-width="1.5"/>
    <text x="170" y="130" fill="#f3b59c" font-size="13" font-weight="700" text-anchor="middle">패턴 원조 · Anthropic</text>
    <text x="170" y="150" fill="#aeb6c7" font-size="11.5" text-anchor="middle">Code execution with MCP</text>
    <text x="170" y="164" fill="#7f8aa0" font-size="10.5" text-anchor="middle">MCP를 코드 API로 노출</text>
  </g>

  <!-- node: Microsoft -->
  <g>
    <rect x="480" y="106" width="220" height="64" rx="10" fill="#161a24" stroke="#4ade80" stroke-width="1.5"/>
    <text x="590" y="130" fill="#9be7b4" font-size="13" font-weight="700" text-anchor="middle">신규 · Microsoft (BUILD 2026)</text>
    <text x="590" y="150" fill="#aeb6c7" font-size="11.5" text-anchor="middle">CodeAct + Hyperlight micro-VM</text>
    <text x="590" y="164" fill="#7f8aa0" font-size="10.5" text-anchor="middle">지연 ~50%↓ · 토큰 60%+↓</text>
  </g>

  <!-- node: repos -->
  <g>
    <rect x="40" y="268" width="220" height="64" rx="10" fill="#161a24" stroke="#c084fc" stroke-width="1.5"/>
    <text x="150" y="292" fill="#d8b4fe" font-size="13" font-weight="700" text-anchor="middle">오픈소스 에이전트 프레임워크</text>
    <text x="150" y="312" fill="#aeb6c7" font-size="11.5" text-anchor="middle">agent-framework · pydantic-ai</text>
    <text x="150" y="326" fill="#7f8aa0" font-size="10.5" text-anchor="middle">PraisonAI</text>
  </g>

  <!-- node: Claude Code -->
  <g>
    <rect x="270" y="338" width="220" height="58" rx="10" fill="#161a24" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="380" y="362" fill="#bfdbfe" font-size="13" font-weight="700" text-anchor="middle">🟦 Claude Code v2.1.193</text>
    <text x="380" y="382" fill="#aeb6c7" font-size="11" text-anchor="middle">/rewind · 훅 매처 수정 · MCP 재연결</text>
  </g>

  <!-- node: Codex -->
  <g>
    <rect x="500" y="268" width="220" height="64" rx="10" fill="#161a24" stroke="#34d399" stroke-width="1.5"/>
    <text x="610" y="292" fill="#a7f3d0" font-size="13" font-weight="700" text-anchor="middle">🟩 Codex 0.142.3 (stable)</text>
    <text x="610" y="312" fill="#aeb6c7" font-size="11.5" text-anchor="middle">+ 0.143.0-alpha.26 병행 트랙</text>
    <text x="610" y="326" fill="#7f8aa0" font-size="10.5" text-anchor="middle">공용 환경은 stable 핀</text>
  </g>
</svg>
