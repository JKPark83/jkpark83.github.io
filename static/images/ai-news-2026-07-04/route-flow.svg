<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Segoe UI','Apple SD Gothic Neo',sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#111">Agent Builder 시사점 — 게이트웨이로 오픈모델 A/B 하기</text>
  <text x="380" y="54" text-anchor="middle" font-size="12.5" fill="#666">코드는 안 고치고, 라우터만 바꿔 LongCat-2.0을 끼워 넣고 실측</text>

  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5c7cba"/>
    </marker>
  </defs>

  <!-- Step 1 agent -->
  <rect x="34" y="120" width="150" height="80" rx="10" fill="#eaf1fb" stroke="#8aaee0" stroke-width="1.5"/>
  <text x="109" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1a56b0">코딩 에이전트</text>
  <text x="109" y="172" text-anchor="middle" font-size="11.5" fill="#555">Codex / Claude Code</text>
  <text x="109" y="189" text-anchor="middle" font-size="11.5" fill="#555">/ 자체 루프</text>

  <!-- Step 2 gateway -->
  <rect x="230" y="110" width="160" height="100" rx="10" fill="#fff7e6" stroke="#e0b567" stroke-width="1.5"/>
  <text x="310" y="140" text-anchor="middle" font-size="13.5" font-weight="700" fill="#a5761a">게이트웨이</text>
  <text x="310" y="162" text-anchor="middle" font-size="11.5" fill="#555">OpenRouter / LiteLLM</text>
  <text x="310" y="180" text-anchor="middle" font-size="11.5" fill="#555">비용추적·폴백·로깅</text>
  <text x="310" y="197" text-anchor="middle" font-size="11" fill="#888">OpenAI 호환 1엔드포인트</text>

  <!-- branch closed -->
  <rect x="436" y="72" width="150" height="56" rx="10" fill="#f4f4f6" stroke="#bbb" stroke-width="1.5"/>
  <text x="511" y="96" text-anchor="middle" font-size="12.5" font-weight="700" fill="#444">Claude Sonnet 5</text>
  <text x="511" y="114" text-anchor="middle" font-size="11" fill="#777">클로즈드 · 기준선</text>

  <!-- branch open -->
  <rect x="436" y="192" width="150" height="56" rx="10" fill="#e8f5ec" stroke="#7bbf93" stroke-width="1.5"/>
  <text x="511" y="216" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1b7a3d">LongCat-2.0</text>
  <text x="511" y="234" text-anchor="middle" font-size="11" fill="#3a8b57">오픈 MIT · 저가</text>

  <!-- eval gate -->
  <rect x="628" y="112" width="108" height="96" rx="10" fill="#eaf1fb" stroke="#8aaee0" stroke-width="1.5"/>
  <text x="682" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1a56b0">Eval 게이트</text>
  <text x="682" y="161" text-anchor="middle" font-size="10.5" fill="#555">정확도 Δ</text>
  <text x="682" y="177" text-anchor="middle" font-size="10.5" fill="#555">비용·토큰 Δ</text>
  <text x="682" y="193" text-anchor="middle" font-size="10.5" fill="#555">툴콜 성공률</text>

  <!-- arrows -->
  <line x1="184" y1="160" x2="228" y2="160" stroke="#5c7cba" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="390" y1="140" x2="434" y2="104" stroke="#5c7cba" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="390" y1="178" x2="434" y2="216" stroke="#5c7cba" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="586" y1="100" x2="626" y2="140" stroke="#5c7cba" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="586" y1="220" x2="626" y2="182" stroke="#5c7cba" stroke-width="2" marker-end="url(#a2)"/>

  <!-- footer rule -->
  <rect x="34" y="288" width="702" height="46" rx="10" fill="#f6f9f6" stroke="#d6e6dc"/>
  <text x="52" y="308" font-size="12.5" font-weight="700" fill="#1b7a3d">핵심 규칙</text>
  <text x="52" y="326" font-size="11.5" fill="#555">에이전트 코드는 그대로. 라우터 한 줄로 모델을 바꿔 같은 태스크를 돌리고, Δ가 (+)일 때만 오픈모델로 승격한다.</text>
</svg>
