<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <rect width="760" height="440" fill="#0f172a"/>
  <text x="380" y="38" fill="#f8fafc" font-size="21" font-weight="700" text-anchor="middle">오늘의 AI 변화 지도 — 에이전트 훈련·평가 루프</text>
  <text x="380" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">훈련 → 스캐폴드 → 실행 → 평가 → 다시 훈련</text>

  <!-- Stage 1: 훈련 -->
  <rect x="40" y="100" width="160" height="120" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="120" y="128" fill="#38bdf8" font-size="15" font-weight="700" text-anchor="middle">① 훈련 (RL)</text>
  <text x="120" y="154" fill="#e2e8f0" font-size="12.5" text-anchor="middle">ProRL Agent</text>
  <text x="120" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">rollout-as-a-service</text>
  <text x="120" y="196" fill="#e2e8f0" font-size="12.5" text-anchor="middle">OpenPipe / ART</text>
  <text x="120" y="212" fill="#94a3b8" font-size="11" text-anchor="middle">GRPO · 10.1k★</text>

  <!-- Stage 2: 스캐폴드 -->
  <rect x="300" y="100" width="160" height="120" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="380" y="128" fill="#a78bfa" font-size="15" font-weight="700" text-anchor="middle">② 스캐폴드</text>
  <text x="380" y="156" fill="#e2e8f0" font-size="12.5" text-anchor="middle">SWE-agent</text>
  <text x="380" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">19.6k★ · Python</text>
  <text x="380" y="198" fill="#94a3b8" font-size="11" text-anchor="middle">에이전트 루프 +</text>
  <text x="380" y="213" fill="#94a3b8" font-size="11" text-anchor="middle">도구·환경 인터페이스</text>

  <!-- Stage 3: 실행 -->
  <rect x="560" y="100" width="160" height="120" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="640" y="128" fill="#34d399" font-size="15" font-weight="700" text-anchor="middle">③ 실행 (headless)</text>
  <text x="640" y="156" fill="#e2e8f0" font-size="12.5" text-anchor="middle">claude -p</text>
  <text x="640" y="176" fill="#e2e8f0" font-size="12.5" text-anchor="middle">codex exec</text>
  <text x="640" y="200" fill="#94a3b8" font-size="11" text-anchor="middle">CI·배치 자동화</text>

  <!-- Stage 4: 평가 -->
  <rect x="230" y="300" width="300" height="108" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="380" y="328" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">④ 평가 (process-level)</text>
  <text x="380" y="352" fill="#e2e8f0" font-size="12" text-anchor="middle">SWE-bench · SWE-rebench V2</text>
  <text x="380" y="372" fill="#e2e8f0" font-size="12" text-anchor="middle">Hugging Face agent-eval</text>
  <text x="380" y="394" fill="#94a3b8" font-size="11" text-anchor="middle">정답뿐 아니라 "몇 스텝·몇 호출"까지 측정</text>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <line x1="200" y1="160" x2="296" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="460" y1="160" x2="556" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="640" y1="220" x2="640" y2="354" stroke="#64748b" stroke-width="2"/>
  <line x1="640" y1="354" x2="534" y2="354" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="226" y1="354" x2="120" y2="354" stroke="#64748b" stroke-width="2"/>
  <line x1="120" y1="354" x2="120" y2="224" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <text x="690" y="290" fill="#64748b" font-size="11" text-anchor="middle">결과 수집</text>
  <text x="70" y="290" fill="#64748b" font-size="11" text-anchor="middle">보상 신호</text>
</svg>
